<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script>
(function() {
  var VIEWER_BUILD = '2026-07-09-ios10';
  try {
    var p = new URLSearchParams(location.search);
    if (p.get('v') !== VIEWER_BUILD || !p.get('t')) {
      p.set('v', VIEWER_BUILD);
      if (!p.get('t')) p.set('t', String(Date.now()));
      location.replace(location.pathname + '?' + p.toString() + location.hash);
    }
  } catch (e) {}
})();
</script>
<title>万年山VR</title>
<meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<link rel="icon" href="vr-icon.ico" type="image/x-icon">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
:root { --hi-res-peek-fade: 1.65s; }
body.hi-res-peek-fast-out { --hi-res-peek-fade: 0.75s; }
#pano { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transition: opacity var(--hi-res-peek-fade) ease-in-out; }
body.hi-res-peek-active #pano { opacity: 0; }
body.hi-res-peek-live #pano { pointer-events: none; }

/* 十字キー（測定用：白） */
#crosshair {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 30px; height: 30px; pointer-events: none; z-index: 100; opacity: 0; transition: opacity 0.5s ease;
}
#crosshair.visible { opacity: 0.6; }
#crosshair::before, #crosshair::after { content: ''; position: absolute; background: white; }
#crosshair::before { top: 14px; left: 0; width: 30px; height: 2px; }
#crosshair::after { left: 14px; top: 0; width: 2px; height: 30px; }

#compassContainer {
  position: absolute;
  top: env(safe-area-inset-top, 0px);
  right: 8px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  z-index: 100;
  transition: opacity 0.5s ease;
  opacity: 0;
  pointer-events: none;
}
#compassContainer.visible { opacity: 1; pointer-events: auto; }

.mini-map-widget {
  width: 56px;
  height: 56px;
  flex-shrink: 0;
  cursor: pointer;
  transition: width 0.22s ease, height 0.22s ease;
  -webkit-tap-highlight-color: transparent;
}
@media (min-width: 768px) {
  .mini-map-widget {
    width: 112px;
    height: 112px;
  }
}
.mini-map-widget.is-expanded {
  width: 224px;
  height: 224px;
}
@media (min-width: 768px) {
  .mini-map-widget.is-expanded {
    width: 448px;
    height: 448px;
  }
}
.mini-map-disk {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  overflow: hidden;
  border: 3px solid #0066ff;
  background: #1a1a1a;
  box-shadow: 0 2px 8px rgba(0,0,0,0.35);
  position: relative;
}
.mini-map-pan {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  will-change: transform;
}
.mini-map-overlay {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.mini-map-img {
  width: 100%;
  height: 100%;
  object-fit: fill;
  display: block;
  pointer-events: none;
  user-select: none;
}
.mini-map-trail {
  fill: none;
  stroke: rgba(255, 220, 60, 0.9);
  stroke-width: 1.4;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.mini-map-pin-dot {
  fill: rgba(255, 255, 255, 0.95);
  stroke: rgba(0, 0, 0, 0.45);
  stroke-width: 0.5;
}
.mini-map-pin-dot.is-active {
  fill: #ff4040;
  stroke: #fff;
  stroke-width: 0.8;
}
.mini-map-you-dot {
  fill: #0066ff;
  stroke: #fff;
  stroke-width: 0.9;
}
.mini-map-north-mark {
  fill: rgba(255, 255, 255, 0.95);
  font-family: sans-serif;
  font-size: 7px;
  font-weight: bold;
  text-anchor: middle;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s ease;
}
.mini-map-widget.is-expanded .mini-map-north-mark { opacity: 0.92; }
.mini-map-pegman-body {
  fill: #e86a2c;
  stroke: #5a2208;
  stroke-width: 0.55;
}
.mini-map-view-cone {
  fill: rgba(66, 133, 244, 0.55);
  stroke: rgba(255, 255, 255, 0.85);
  stroke-width: 0.35;
}
.mini-map-bearing-wedge { display: none; }
.mini-map-dir-label {
  margin-top: 2px;
  padding: 1px 6px;
  border-radius: 8px;
  background: rgba(0, 0, 0, 0.72);
  color: #fff;
  font-family: sans-serif;
  font-size: 11px;
  font-weight: bold;
  line-height: 1.25;
  text-align: center;
  white-space: nowrap;
  pointer-events: none;
  min-width: 36px;
  opacity: 0;
  transition: opacity 0.15s ease, font-size 0.15s ease;
}
.mini-map-widget.is-expanded + .mini-map-dir-label,
#compassContainer.visible .mini-map-dir-label { opacity: 1; }
.mini-map-widget.is-expanded + .mini-map-dir-label { font-size: 17px; padding: 2px 10px; }

.heading-adjust-bar {
  display: none;
  position: absolute;
  bottom: 228px;
  right: 100px;
  z-index: 101;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 5px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.heading-adjust-bar.is-dev-visible {
  display: flex;
  opacity: 0.9;
  pointer-events: auto;
}
.heading-adjust-bar button {
  min-width: 30px;
  height: 26px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.55);
  background: rgba(0,0,0,0.72);
  color: #fff;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  padding: 0 6px;
  line-height: 1;
}
.heading-adjust-bar button:active { background: rgba(0,102,255,0.85); }
.heading-adjust-mode {
  font-family: sans-serif;
  font-size: 10px;
  color: #fff;
  background: rgba(0,0,0,0.55);
  padding: 2px 6px;
  border-radius: 6px;
  min-width: 52px;
  text-align: center;
  cursor: pointer;
  user-select: none;
}
.heading-adjust-mode.is-scene { background: rgba(0,102,255,0.75); }

#degreeCircle {
  width: 40px; height: 40px; background: rgba(255,255,255,0.92); border-radius: 50%; border: 3px solid #0066ff;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  font-family: sans-serif; font-weight: bold; color: #0066ff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.28); flex-shrink: 0;
  line-height: 1;
  padding: 0;
  pointer-events: none;
  overflow: hidden;
}
#degreeCircle .degree-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transform: scale(1.24);
  transform-origin: center center;
  line-height: 1;
  gap: 1px;
}
#degreeCircle #yawTxt {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: -0.4px;
  margin-top: 2px;
  font-variant-numeric: tabular-nums;
}
#degreeCircle #pitchTxt {
  font-size: 10px;
  font-weight: 900;
  color: #222;
  letter-spacing: -0.4px;
  margin-top: 0;
  font-variant-numeric: tabular-nums;
}
#degreeCircle small { display: none; }

/* ジャイロ（地図と重ならないよう左上） */
#gyroButton {
  position: absolute;
  top: calc(env(safe-area-inset-top, 0px) + 8px);
  left: 10px;
  right: auto;
  width: 40px;
  height: 40px;
  border: none;
  border-radius: 50%;
  z-index: 101;
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
  background: rgba(48, 108, 210, 0.9);
  color: #fff;
  font-size: 12px;
  font-weight: bold;
  font-family: sans-serif;
  letter-spacing: -0.4px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.45);
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  line-height: 1;
}
#gyroButton .gyro-btn-label {
  display: block;
  font-size: 14px;
  font-weight: 900;
  letter-spacing: -1.25px;
  line-height: 1;
  transform: none;
  text-shadow: none;
  padding: 0;
}
#gyroButton.visible { opacity: 0.88; pointer-events: auto; }
#gyroButton.is-on { background: rgba(22, 155, 78, 0.94); }
/* iPhoneのみ：GYRO丸を2割小さく（iPadは40pxのまま） */
@media (max-width: 520px) {
  #gyroButton {
    width: 32px;
    height: 32px;
  }
  #gyroButton .gyro-btn-label {
    font-size: 11px;
    letter-spacing: -0.95px;
  }
  /* 黄色矢印：右へ丸1つ分・下矢印をMap丸と同じ高さに */
  #arrowUp { bottom: 140px; right: 60px; }
  #arrowDown { bottom: 30px; right: 60px; }
  #arrowLeft { bottom: 85px; right: 125px; }
  #arrowRight { bottom: 85px; right: 8px; }
  .heading-adjust-bar {
    bottom: 208px;
    right: 40px;
  }
}
body.gyro-active #pano { touch-action: none; }

/* コンパス（針：data.js / マップジェネレータの heading があるシーンのみ） */
#compassCircle {
  width: 60px; height: 60px; background: rgba(255,255,255,0.92); border-radius: 50%; border: 3px solid #0066ff;
  display: none; justify-content: center; align-items: center; box-shadow: 0 4px 8px rgba(0,0,0,0.28);
  position: relative; flex-shrink: 0; overflow: visible;
}
#compassCircle.active { display: flex; }
#compassCircle .compass-dial,
#compassCircle .compass-needle {
  position: absolute; left: 50%; top: 50%; width: 52px; height: 52px;
  margin-left: -26px; margin-top: -26px;
  pointer-events: none;
}
#compassCircle .compass-needle {
  transform-origin: 26px 26px;
  transition: transform 0.12s linear;
}

/* 旧コンパス（非表示・互換用） */
#compassCircle { display: none !important; }

/* 画面角度（専門家用・ジャイロ丸サイズ） */

#volumeContainer {
  position: absolute; top: 20px; left: 20px; height: 60px; display: flex; align-items: center;
  background: rgba(54, 40, 34, 0.85); padding: 0 20px; border-radius: 30px;
  z-index: 100; transition: opacity 0.5s ease; opacity: 0; border: 1px solid rgba(255,255,255,0.2);
  pointer-events: none;
}
#volumeContainer.visible { opacity: 0.8; pointer-events: auto; }
#volumeLabel { color: #FF8C00; font-weight: bold; font-family: sans-serif; margin-right: 12px; font-size: 18px; }
#volumeSlider { cursor: pointer; width: 100px; height: 8px; accent-color: #00FF00; }
.auto-ctrl{position:absolute;left:20px;height:46px;display:flex;align-items:center;padding:0 14px;border-radius:23px;z-index:100;transition:opacity 0.5s ease;opacity:0;pointer-events:none;}
.auto-ctrl.visible{opacity:0.9;pointer-events:auto;}
#speedContainer{top:90px;background:rgba(10,30,55,0.88);border:1px solid rgba(80,160,255,0.4);}
#zoomContainer{top:144px;background:rgba(10,45,25,0.88);border:1px solid rgba(80,200,100,0.4);}
#fadeContainer{top:198px;background:rgba(55,20,40,0.88);border:1px solid rgba(255,100,160,0.4);}
.ctrl-label{font-weight:bold;font-family:sans-serif;font-size:14px;margin-right:8px;white-space:nowrap;}
#speedContainer .ctrl-label{color:#66ccff;}#zoomContainer .ctrl-label{color:#88ee88;}#fadeContainer .ctrl-label{color:#ffaacc;}
.ctrl-slider{cursor:pointer;width:80px;height:8px;}
#speedSlider{accent-color:#66ccff;}#zoomSlider{accent-color:#88ee88;}#fadeSlider{accent-color:#ffaacc;}
.ctrl-val{font-family:sans-serif;font-size:12px;margin-left:7px;min-width:38px;}
#speedVal{color:#aaddff;}#zoomVal{color:#aaffaa;}#fadeVal{color:#ffccdd;}

#mapButton {
  position: absolute;
  bottom: 30px;
  left: 20px;
  width: 70px;
  height: 70px;
  cursor: pointer;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
  object-fit: contain;
  background: transparent;
  border: none;
}
#mapButton.visible { opacity: 0.7; pointer-events: auto; }
#counter { position: absolute; bottom: 30px; left: 100px; width: 40px; height: 40px; background: white; border: 3px solid #ff0000; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 15px; font-weight: 900; color: #0066ff; z-index: 100; opacity: 0; transition: opacity 0.5s ease; pointer-events: none; user-select: none; line-height: 1; letter-spacing: -0.5px; padding: 0; overflow: hidden; }
#counter.visible { opacity: 0.7; pointer-events: auto; }

.arrow-nav { position: absolute; width: 60px; height: 60px; cursor: pointer; z-index: 100; opacity: 0; transition: opacity 0.5s ease; pointer-events: none; }
.arrow-nav.visible { opacity: 0.58; pointer-events: auto; }
.arrow-nav.arrow-blink.visible { animation: yellowArrowBlink 1.7s ease-in-out infinite; }
@keyframes yellowArrowBlink {
  0%, 100% { opacity: 0.13; filter: drop-shadow(0 0 3px rgba(255, 255, 0, 0.28)); }
  50% { opacity: 0.4; filter: drop-shadow(0 0 6px rgba(255, 255, 0, 0.4)); }
}
#arrowUp { bottom: 160px; right: 120px; }
#arrowDown { bottom: 50px; right: 120px; }
#arrowLeft { bottom: 105px; right: 185px; }
#arrowRight { bottom: 105px; right: 55px; }
/* 緑・青は廃止（DOM は残すが常に非表示） */
#arrowUpGreen, #arrowDownGreen, #arrowBlueLeft, #arrowBlueRight {
  display: none !important;
  visibility: hidden !important;
  pointer-events: none !important;
}

/* 53-cc001 フェードイン用オーバーレイ（白系） */
#fadeOverlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(255, 255, 255, 0.8); z-index: 1000; opacity: 0;
  pointer-events: none; transition: opacity 2s ease-out;
}

/* ===== infoHotspot テキストオーバーレイ ===== */
#sceneText {
  position: fixed;
  z-index: 200;
  display: block;
  box-sizing: border-box;
  /* スマホ実機：data.js の px × 1.6（2月仕様）。PCプレビューは 文字入力 で px そのまま */
  width: 88vw;
  max-width: min(88vw, 42em);
  padding: 4px 10px;
  background: none;
  pointer-events: none;
  text-align: left;
  transform: translateX(-50%);
  white-space: pre-wrap;
  word-wrap: break-word;
  overflow-wrap: break-word;
  word-break: normal;
  line-height: 1.4;
  /* 多重シャドウで背景に溶け込む */
  text-shadow:
    0   0   2px  rgba(0,0,0,1),
    0   0   5px  rgba(0,0,0,1),
    0   0   10px rgba(0,0,0,0.85),
    1px  1px 1px rgba(0,0,0,1),
    -1px 1px 1px rgba(0,0,0,1),
    1px -1px 1px rgba(0,0,0,1),
    -1px -1px 1px rgba(0,0,0,1);
  opacity: 1;
  transition: opacity 1s ease;
}

/* 扉演出用：部分ぼかし（中心→外側へグラデーション） */
#blurOverlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 1001;
  opacity: 0;
  pointer-events: none;

  /* ぼかし強度（JSで更新） */
  -webkit-backdrop-filter: blur(var(--blurPx, 14px));
  backdrop-filter: blur(var(--blurPx, 14px));

  /* クリック位置を中心に、内側ほど強く・外側ほど透明（=くっきり） */
  -webkit-mask-image: radial-gradient(circle at var(--bx, 50%) var(--by, 50%),
    rgba(0,0,0,1) 0px,
    rgba(0,0,0,1) var(--innerR, 120px),
    rgba(0,0,0,0) var(--outerR, 260px)
  );
  mask-image: radial-gradient(circle at var(--bx, 50%) var(--by, 50%),
    rgba(0,0,0,1) 0px,
    rgba(0,0,0,1) var(--innerR, 120px),
    rgba(0,0,0,0) var(--outerR, 260px)
  );
}

.portal-hotspot {
  position: relative;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  overflow: visible;
  border: none;
  outline: none;
  background: transparent;
  box-shadow: none;
}
.portal-hotspot img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  border: none;
  outline: none;
  background: transparent;
  box-shadow: none;
}
/* タップ判定（感度アップ：中央の当たり判定を広め） */
.portal-hit-area {
  position: absolute;
  left: 26%;
  top: 26%;
  width: 48%;
  height: 48%;
  border-radius: 50%;
  z-index: 2;
  cursor: pointer;
  pointer-events: none;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.portal-hotspot.portal-tappable {
  pointer-events: none;
}
.portal-hotspot.portal-tappable .portal-hit-area {
  pointer-events: auto;
}
@media (pointer: coarse) {
  .portal-hit-area {
    left: 22%;
    top: 22%;
    width: 56%;
    height: 56%;
  }
}
.portal-inner {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  transform-origin: 50% 50%;
  transition-property: transform;
  transition-timing-function: ease-in-out;
  will-change: transform;
}
.portal-reveal-cover {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-image: url("start.png");
  background-size: 100% 100%;
  background-position: center;
  background-repeat: no-repeat;
  transition-property: opacity;
  transition-timing-function: ease-in-out;
  pointer-events: none;
  transform: scale(1.1);
  transform-origin: 50% 50%;
}

/* 2D動画ホットスポット（ガイド人物・パノラマ上） */
.scene-video-2d-wrap {
  overflow: hidden;
  cursor: pointer;
  pointer-events: auto;
  opacity: 1;
  box-sizing: border-box;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  transform: translateZ(1px);
  backface-visibility: hidden;
  position: relative;
  z-index: 2;
  background: transparent;
  border: none;
  outline: none;
  box-shadow: none;
}
.scene-video-mask {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  pointer-events: none;
}
.scene-video-2d-wrap video {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center center;
  background: transparent;
  opacity: 1;
  vertical-align: top;
}
.scene-video-mask.guide-matte-lighten {
  mix-blend-mode: lighten;
}
/* iPad/Safari: ホットスポット全体で lighten（PCと同じ見え方） */
.scene-video-2d-wrap.guide-ios-visible {
  isolation: isolate;
  mix-blend-mode: lighten;
  -webkit-transform: translateZ(2px);
  transform: translateZ(2px);
  z-index: 2;
}
.scene-video-2d-wrap.guide-ios-visible .scene-video-mask {
  mix-blend-mode: lighten;
  -webkit-transform: translateZ(1px);
  transform: translateZ(1px);
}
.scene-video-2d-wrap.guide-ios-visible video.scene-video-2d {
  opacity: 1 !important;
  mix-blend-mode: lighten;
  position: relative;
}
.scene-video-mask.guide-img-matte img.guide-video-frame {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center center;
  pointer-events: none;
}
#guideIosOverlayRoot {
  position: fixed;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 360;
  overflow: visible;
}
.guide-ios-screen-overlay {
  position: fixed;
  display: none;
  pointer-events: none;
  mix-blend-mode: lighten;
  -webkit-mix-blend-mode: lighten;
  isolation: isolate;
  box-sizing: border-box;
}
.guide-ios-screen-overlay.guide-img-matte {
  mix-blend-mode: normal;
}
.guide-ios-screen-overlay.guide-ios-canvas-matte,
.guide-ios-screen-overlay.guide-ios-native-alpha {
  mix-blend-mode: normal;
  background: transparent !important;
  isolation: isolate;
}
.guide-ios-screen-overlay.guide-ios-native-alpha video.scene-video-2d {
  opacity: 1 !important;
  mix-blend-mode: normal;
}
.guide-ios-screen-overlay.guide-ios-canvas-matte .scene-video-mask {
  background: transparent;
}
.guide-ios-screen-overlay.guide-ios-canvas-matte canvas.guide-video-canvas {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center center;
  background: transparent;
}
.scene-video-mask.guide-canvas-matte canvas.guide-video-canvas {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center center;
  background: transparent;
  vertical-align: top;
}
.scene-video-mask.guide-canvas-matte video.scene-video-2d {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  pointer-events: none;
}
.scene-video-ground-shadow,
.scene-video-ground-shadow-pano {
  pointer-events: none;
  transform-origin: 50% 50%;
  line-height: 0;
  position: relative;

// ========================================
// ★ 修正案A：URLパラメータ読み込みをIIFE外に移動
// スコープ隔離による greenArrowConfig 消失を解決
// ========================================
var urlParams = new URLSearchParams(window.location.search);
var embedPlacerMode = urlParams.get('embed') === '1';
var embedShadowMode = urlParams.get('embed') === 'shadow';
var placerImageCacheBust = String(Date.now());
if (embedPlacerMode) document.body.classList.add('embed-placer');
if (embedShadowMode) document.body.classList.add('embed-shadow');
var initialYaw = urlParams.get('yaw');

/** 緑矢印の遷移先ID補正（17dd001 → 17-dd001）。グローバル定義（URL読込より前） */
function resolveSceneId(rawId) {
  if (!rawId) return null;
  var s = String(rawId).trim();
  if (typeof scenesData !== 'undefined' && scenesData && scenesData[s]) return s;
  if (window.APP_DATA && window.APP_DATA.scenes) {
    var compact = s.replace(/-/g, '');
    for (var i = 0; i < window.APP_DATA.scenes.length; i++) {
      var sid = window.APP_DATA.scenes[i].id;
      if (sid === s) return sid;
      if (sid.replace(/-/g, '') === compact) return sid;
    }
    var m = s.match(/^(\d+)([a-z]{2})(\d{3})$/i);
    if (m) {
      var fixed = m[1] + '-' + m[2].toLowerCase() + m[3];
      for (var j = 0; j < window.APP_DATA.scenes.length; j++) {
        if (window.APP_DATA.scenes[j].id === fixed) return fixed;
      }
    }
  }
  return null;
}

function normalizeGreenArrowConfig() {
  if (!window.greenArrowConfig || !window.greenArrowConfig.arrows.length) return;
  window.greenArrowConfig.arrows = window.greenArrowConfig.arrows.map(function(a) {
    var tid = resolveSceneId(a.targetSceneId) || a.targetSceneId;
    if (tid !== a.targetSceneId) {
      console.warn('⚠️ 緑矢印の遷移先IDを補正:', a.targetSceneId, '→', tid);
    }
    var out = {
      sceneId: a.sceneId,
      startAngle: a.startAngle,
      endAngle: a.endAngle,
      targetSceneId: tid
    };
    if (a.direction === 'down') out.direction = 'down';
    else out.direction = 'up';
    return out;
  });
}

/** 旧 rules 形式 → 新形式（type/target/crossroads） */
function normalizeSideBranchEntry(entry) {
  if (!entry) return entry;
  if (entry.type === 'branch' || entry.type === 'return') return entry;
  if (!entry.rules || !entry.rules.length) return entry;
  var sceneId = entry.sceneId;
  for (var i = 0; i < entry.rules.length; i++) {
    if (entry.rules[i].whenReturn) {
      return { sceneId: sceneId, type: 'return' };
    }
  }
  var targets = [];
  entry.rules.forEach(function(rule) {
    (rule.exits || []).forEach(function(ex) {
      if (ex.action === 'return' || !ex.targetSceneId) return;
      var tid = resolveSceneId(ex.targetSceneId) || ex.targetSceneId;
      if (targets.indexOf(tid) < 0) targets.push(tid);
    });
  });
  if (!targets.length) return { sceneId: sceneId, type: 'branch' };
  return {
    sceneId: sceneId,
    type: 'branch',
    target: targets[0],
    targetAlt: targets.length > 1 ? targets[1] : null,
    crossroads: targets.length > 1
  };
}

function sceneIdExistsInAppData(id) {
  if (!id || !window.APP_DATA || !APP_DATA.scenes) return false;
  for (var i = 0; i < APP_DATA.scenes.length; i++) {
    if (APP_DATA.scenes[i] && APP_DATA.scenes[i].id === id) return true;
  }
  return false;
}

function isValidSideBranchEntry(entry) {
  if (!entry || !entry.sceneId) return false;
  if (!sceneIdExistsInAppData(entry.sceneId)) return false;
  if (entry.type === 'return' && entry.target) {
    var retId = resolveSceneId(entry.target) || entry.target;
    return sceneIdExistsInAppData(retId);
  }
  if (entry.type === 'branch') {
    if (!entry.target) return false;
    var targetId = resolveSceneId(entry.target) || entry.target;
    if (!sceneIdExistsInAppData(targetId)) return false;
    if (entry.targetAlt) {
      var altId = resolveSceneId(entry.targetAlt) || entry.targetAlt;
      if (!sceneIdExistsInAppData(altId)) entry.targetAlt = null;
    }
    return true;
  }
  return true;
}

function filterSideBranchEntries() {
  if (!window.sideBranchConfig || !window.sideBranchConfig.branches) return;
  var before = window.sideBranchConfig.branches.length;
  window.sideBranchConfig.branches = window.sideBranchConfig.branches.filter(isValidSideBranchEntry);
  if (before !== window.sideBranchConfig.branches.length) {
    console.log('✅ sideBranches filtered:', before, '→', window.sideBranchConfig.branches.length);
  }
}

function sceneDeclaredMaxLevel(sd) {
  if (!sd || !sd.levels || !sd.levels.length) return 0;
  return sd.levels.reduce(function(m, l) { return Math.max(m, l.size || 0); }, 0);
}

/** 混在作品はシーンごとの tilesBase を使う */
function resolveTourTilesDefaults(appData) {
  var scenes = (appData && appData.scenes) || [];
  if (!scenes.length) return;
  var tourBase = appData.viewConfig && appData.viewConfig.tilesBase;
  if (tourBase) window.TILES_BASE = tourBase;

  function effectiveBase(s) {
    if (s.tilesBase) return s.tilesBase;
    if (tourBase) return tourBase;
    var maxLv = sceneDeclaredMaxLevel(s);
    if (maxLv >= 4096) return 'tiles4096';
    if (maxLv >= 2048) return 'tiles2048';
    return (window.TILES_BASE || 'tiles1024');
  }

  scenes.forEach(function(s) {
    if (!s.tilesBase) s.tilesBase = effectiveBase(s);
  });
}

function startViewer() {
'use strict';
var Marzipano = window.Marzipano;
var data = window.APP_DATA;
resolveTourTilesDefaults(data);
filterSideBranchEntries();

function sceneIdParts(id) {
  var match = String(id || '').match(/-([a-zA-Z]+)(\d+)$/);
  return match ? { course: match[1].toLowerCase(), number: parseInt(match[2], 10) } : null;
}

function inferScenePosition(sd) {
  var pos = Number(sd.position);
  if (Number.isFinite(pos)) return pos;
  var parts = sceneIdParts(sd.id);
  return parts && Number.isFinite(parts.number) ? parts.number : 1;
}

function normalizeSceneDirection(sd) {
  var dir = String(sd.direction || '').toLowerCase();
  if (dir === 'main') return 'iki';
  if (dir === 'iki' || dir === 'left' || dir === 'right' || dir === 'portal') return dir;

  var parts = sceneIdParts(sd.id);
  if (!parts) return 'iki';
  if (parts.course === 'bb') return 'left';
  if (parts.course === 'cc') return 'right';
  if (parts.course === 'dd') return 'portal';
  return 'iki';
}

function sceneCourseKey(sd) {
  if (sd && sd.course) return String(sd.course).toLowerCase();
  var parts = sceneIdParts(sd && sd.id);
  return parts ? parts.course : normalizeSceneDirection(sd || {});
}

var CC_CHAIN_SCENE_IDS = {
  1: '23-cc001',
  2: '24-cc002',
  3: '25-cc003'
};

function ccChainIndexForSceneId(sceneId) {
  for (var p in CC_CHAIN_SCENE_IDS) {
    if (CC_CHAIN_SCENE_IDS.hasOwnProperty(p) && CC_CHAIN_SCENE_IDS[p] === sceneId) {
      return Number(p);
    }
  }
  return null;
}

function formatCounterLabel(sceneData) {
  if (!sceneData) return '?';
  var ccIdx = ccChainIndexForSceneId(sceneData.id);
  if (ccIdx != null) return 'C' + ccIdx;
  var parts = sceneIdParts(sceneData.id);
  if (parts) {
    if (parts.course === 'bb') return 'B' + parts.number;
    if (parts.course === 'cc') return 'C' + parts.number;
    if (parts.course === 'dd') return 'D' + parts.number;
  }
  var pos = Number(inferScenePosition(sceneData));
  var course = sceneCourseKey(sceneData);
  if (course === 'bb') return 'B' + pos;
  if (course === 'cc') return 'C' + pos;
  if (course === 'dd') return 'D' + pos;
  return String(pos);
}

function refreshCounterDisplay() {
  if (!counterEl || !currentSceneObj) return;
  counterEl.textContent = formatCounterLabel(currentSceneObj.data);
}

// ★ タイルレベルを自動補正（シーンごとの tilesBase に合わせて上限を決める）
function sceneTilesBase(sd) {
  return (sd && sd.tilesBase) ? sd.tilesBase : (window.TILES_BASE || 'tiles');
}
function sceneMaxTileSize(sd) {
  var base = sceneTilesBase(sd);
  if (base === 'tiles4096' || (sd && sd.maxTileSize === 4096)) return 4096;
  if (base === 'tiles2048' || (sd && sd.maxTileSize === 2048)) return 2048;
  if (base === 'tiles1024') return 1024;
  if (sceneDeclaredMaxLevel(sd) >= 4096) return 4096;
  if (sceneDeclaredMaxLevel(sd) >= 2048) return 2048;
  return 1024;
}
var LEGACY_DEFAULT_FOV_RAD = 1.1479251634083179;

function resolveSceneInitialFov(sceneData) {
  var iv = sceneData && sceneData.initialViewParameters ? sceneData.initialViewParameters : {};
  if (iv.customFov === true && iv.fov != null) {
    return iv.fov;
  }
  var vc = window.APP_DATA && window.APP_DATA.viewConfig;
  if (vc && vc.defaultFovDeg != null && isFinite(vc.defaultFovDeg)) {
    return degToRad(parseFloat(vc.defaultFovDeg));
  }
  if (iv.fov != null) {
    return iv.fov;
  }
  return LEGACY_DEFAULT_FOV_RAD;
}

function tiles1024ZoomBoost() {
  var vc = window.APP_DATA && window.APP_DATA.viewConfig;
  var v = vc && vc.tiles1024ZoomBoost != null ? parseFloat(vc.tiles1024ZoomBoost) : 3;
  if (!isFinite(v)) return 3;
  return Math.max(1, Math.min(3, v));
}

function sceneViewLimiter(sd) {
  var face = sd.faceSize || 2048;
  var maxTile = sceneMaxTileSize(sd);
  if (maxTile >= 4096) {
    return Marzipano.RectilinearView.limit.traditional(
      face * 3,
      75 * Math.PI / 180,
      110 * Math.PI / 180
    );
  }
  if (maxTile >= 2048) {
    // 2048タイル: resolution制限を緩めてピンチ拡大を約2〜3倍可能に
    return Marzipano.RectilinearView.limit.traditional(
      face * 3,
      75 * Math.PI / 180,
      110 * Math.PI / 180
    );
  }
  var boost = tiles1024ZoomBoost();
  if (boost <= 1) {
    return Marzipano.RectilinearView.limit.traditional(face, 75 * Math.PI / 180, 120 * Math.PI / 180);
  }
  // 1024タイル: 1〜3倍までデジタルズーム（多少ぼやけるがピンチ拡大可能）
  var minFovDeg = 120 - 10 * (boost - 1);
  return Marzipano.RectilinearView.limit.traditional(
    face * boost,
    75 * Math.PI / 180,
    minFovDeg * Math.PI / 180
  );
}
data.scenes.forEach(function(scene) {
  var maxTile = sceneMaxTileSize(scene);
  scene.levels = scene.levels.filter(function(l) { return l.size <= maxTile; });
  scene.levels.forEach(function(l) {
    if (!l.fallbackOnly) l.tileSize = l.size;
  });
  if (maxTile >= 2048) {
    console.log('🔎 tiles:', scene.id, sceneTilesBase(scene),
      'max=' + maxTile,
      'levels=' + scene.levels.map(function(l) { return l.size; }).join('/'));
  }
});

var hiResPeekBgmAudio = null;

/** シーンID/名前の直後に a が付く音源（例: 5-aa006a.mp3）は虫眼鏡アップ時のみ */
function isPeekOnlyBgmFile(file, sceneData) {
  if (!file || !sceneData) return false;
  var base = normalizeSpatialSoundFile(file);
  if (!base || !/a\.(mp3|m4a|wav|ogg)$/i.test(base)) return false;
  var stemA = base.replace(/\.[^.]+$/i, '');
  var id = String(sceneData.id || '').trim();
  var name = String(sceneData.name || '').trim();
  if (id && stemA === id + 'a') return true;
  if (name && stemA === name + 'a') return true;
  return false;
}

function hiResPeekBgmFile(cfg) {
  if (!cfg || !cfg.peekBgm) return '';
  return String(cfg.peekBgm).trim();
}

function buildHiResPeekBgmCandidates(cfg, sceneData) {
  var sceneId = '';
  var sceneName = '';
  if (sceneData) {
    if (typeof sceneData === 'string') sceneId = sceneData;
    else {
      sceneId = sceneData.id || '';
      sceneName = sceneData.name || '';
    }
  }
  var seen = {};
  var out = [];
  function push(f) {
    f = String(f || '').trim().replace(/^sounds\//, '');
    if (!f || seen[f]) return;
    seen[f] = true;
    out.push(f);
  }
  var fromCfg = hiResPeekBgmFile(cfg);
  if (fromCfg) push(fromCfg);
  if (sceneId) {
    push(sceneId + 'a.mp3');
    push(sceneId + 'a.m4a');
    push(sceneId + '/peek.mp3');
    push(sceneId + '/Produce.mp3');
    push('peek-' + sceneId + '.mp3');
    push(sceneId + '-peek.mp3');
  }
  if (sceneName) {
    push(sceneName + 'a.mp3');
    push(sceneName + 'a.m4a');
  }
  return out;
}

function buildSceneBgmAutoCandidates(sceneData) {
  var seen = {};
  var out = [];
  function push(f) {
    f = String(f || '').trim().replace(/^sounds\//, '');
    if (!f || seen[f]) return;
    seen[f] = true;
    out.push(f);
  }
  if (!sceneData) return out;
  var id = sceneData.id;
  var name = sceneData.name;
  if (id) {
    push(id + '.mp3');
    push(id + '.m4a');
    push(id + '/bgm.mp3');
    push('scenes/' + id + '.mp3');
  }
  if (name) {
    push(name + '.mp3');
    push('scenes/' + name + '.mp3');
  }
  return out;
}

function soundsUrl(file) {
  var url = 'sounds/' + String(file || '').replace(/^sounds\//, '');
  if (url.indexOf('?') < 0) url += '?v=' + encodeURIComponent(BUILD_STAMP);
  return url;
}

function probeSoundsFile(file) {
  return fetch(soundsUrl(file), { method: 'HEAD', cache: 'no-store' })
    .then(function(r) { return r.ok; })
    .catch(function() { return false; })
    .then(function(ok) {
      if (ok) return true;
      return probeSoundsFileViaAudio(file);
    });
}

function probeSoundsFileViaAudio(file) {
  return new Promise(function(resolve) {
    var audio = new Audio();
    var done = false;
    function finish(ok) {
      if (done) return;
      done = true;
      try { audio.removeAttribute('src'); audio.load(); } catch (e) {}
      resolve(!!ok);
    }
    audio.addEventListener('canplay', function() { finish(true); }, { once: true });
    audio.addEventListener('error', function() { finish(false); }, { once: true });
    setTimeout(function() { finish(false); }, 2500);
    audio.preload = 'auto';
    audio.src = soundsUrl(file);
    try { audio.load(); } catch (e2) { finish(false); }
  });
}

function resolveAutoSceneBgmItems(sceneData) {
  var candidates = buildSceneBgmAutoCandidates(sceneData).filter(function(file) {
    return !isPeekOnlyBgmFile(file, sceneData);
  });
  if (!candidates.length) return Promise.resolve(null);
  var chain = Promise.resolve(null);
  candidates.forEach(function(file) {
    chain = chain.then(function(found) {
      if (found) return found;
      return probeSoundsFile(file).then(function(ok) {
        return ok ? [{ file: file, loop: false, fromScene: true }] : null;
      });
    });
  });
  return chain;
}

function stopHiResPeekBgm() {
  if (!hiResPeekBgmAudio) return;
  var a = hiResPeekBgmAudio;
  hiResPeekBgmAudio = null;
  if (a.__fadeTimer) {
    clearInterval(a.__fadeTimer);
    clearTimeout(a.__fadeTimer);
    a.__fadeTimer = null;
  }
  if (a.__fadeInTimer) {
    clearInterval(a.__fadeInTimer);
    a.__fadeInTimer = null;
  }
  // iPad/Safari は volume が変えられないためフェードが終わらず止まらない
  if (typeof guideDeviceIsIosSafari === 'function' && guideDeviceIsIosSafari()) {
    try { a.pause(); a.currentTime = 0; } catch (e0) {}
    try { a.removeAttribute('src'); } catch (e1) {}
    return;
  }
  fadeOutAudio(a, function() {
    try { a.pause(); } catch (e0) {}
    try { a.removeAttribute('src'); } catch (e1) {}
  });
}

function playHiResPeekBgm(cfg) {
  stopHiResPeekBgm();
  if (!bgmEnabled && !bgmForce) return;
  if (!audioEnabled) {
    audioEnabled = true;
    audioUnlockConsumed = true;
  }
  var sceneId = currentSceneObj && currentSceneObj.data ? currentSceneObj.data.id : '';
  var candidates = buildHiResPeekBgmCandidates(cfg, currentSceneObj ? currentSceneObj.data : sceneId);
  if (!candidates.length) return;
  bgmSuppressedForVideo++;
  Object.keys(bgmAudios).forEach(function(key) {
    var a = bgmAudios[key];
    if (!a) return;
    if (a.__fadeTimer) {
      clearInterval(a.__fadeTimer);
      clearTimeout(a.__fadeTimer);
      a.__fadeTimer = null;
    }
    if (a.__fadeInTimer) {
      clearInterval(a.__fadeInTimer);
      a.__fadeInTimer = null;
    }
    try { a.pause(); a.volume = 0; } catch (e) {}
  });
  tryPlayHiResPeekBgmCandidate(cfg, candidates, 0);
}

function tryPlayHiResPeekBgmCandidate(cfg, candidates, idx) {
  if (!hiResPeekOpen || idx >= candidates.length) return;
  var file = candidates[idx];
  var url = soundsUrl(file);
  var audio = new Audio(url);
  hiResPeekBgmAudio = audio;
  audio.loop = cfg && cfg.peekBgmLoop === true;
  audio.volume = 0;
  audio.addEventListener('canplay', function() {
    if (!hiResPeekOpen || hiResPeekBgmAudio !== audio) return;
    fadeInAudio(audio, bgmVolume, 400);
  });
  audio.addEventListener('ended', function() {
    if (hiResPeekBgmAudio === audio) hiResPeekBgmAudio = null;
  });
  audio.addEventListener('error', function() {
    if (hiResPeekBgmAudio === audio) hiResPeekBgmAudio = null;
    tryPlayHiResPeekBgmCandidate(cfg, candidates, idx + 1);
  });
  var p = audio.play();
  if (p && p.catch) p.catch(function() {});
  console.log('🎵 虫眼鏡BGM:', file);
}

function hiResPeekVerticalFovRad(horizontalFovRad, aspect) {

function hiResPeekImageFadeOpacity(t) {

var _hiResPeekCmProbe = null;
function hiResPeekCmToPx(cm) {

  var pxPerCm = _hiResPeekCmProbe.offsetWidth;

var hiResPeekMacroSettleUntil = 0;

function hiResPeekMacroStartWidthPx(cfg, vw) {

function hiResPeekApplyZoomPan(zoom, panX, panY) {

function hiResPeekCaptureMacroPastePoint(cfg) {
  var peekView = document.getElementById('hiResPeekView');

            cx: Math.round((pr.left + s0.x - vr.left) * 2) / 2,

      var mr = mag.getBoundingClientRect();
      if (mr.width >= 4 && mr.height >= 4) {
        return {
          cx: Math.round((mr.left + mr.width * (27 / 64) - vr.left) * 2) / 2,
          cy: Math.round((mr.top + mr.height * (27 / 64) - vr.top) * 2) / 2
        };

function hiResPeekSetupMacroPasteLayout(cfg, img, keepZoom) {

  hiResPeekViewState.zoomAnchorY = pt.cy;
  hiResPeekViewState.panX = Math.round((pt.cx - vw / 2) * 2) / 2;
  hiResPeekViewState.panY = Math.round((pt.cy - vh / 2) * 2) / 2;

function hiResPeekCaptureMacroFrameRect(cfg) {
  if (!cfg || !currentView) return null;
  var peekView = document.getElementById('hiResPeekView');
  var pano = document.getElementById('pano');
  if (!peekView || !pano) return null;
  var vr = peekView.getBoundingClientRect();
  var pr = pano.getBoundingClientRect();
  var yawC = degToRad(Number(cfg.yawCenter) || 0);
  var pitchC = degToRad(Number(cfg.pitchCenter) || 0);
  var hy = degToRad(Number(cfg.rangeAngleYaw) || 8) / 2;
  var hp = degToRad(Number(cfg.rangeAnglePitch) || 6) / 2;
  var s0 = null;
  var sX = null;
  var sY = null;
  try {
    s0 = currentView.coordinatesToScreen({ yaw: yawC, pitch: pitchC });
    sX = currentView.coordinatesToScreen({ yaw: yawC + hy, pitch: pitchC });
    sY = currentView.coordinatesToScreen({ yaw: yawC, pitch: pitchC + hp });
  } catch (e0) { s0 = null; }
  if (!s0 || !isFinite(s0.x) || !isFinite(s0.y)) return null;
  var cx = pr.left + s0.x - vr.left;
  var cy = pr.top + s0.y - vr.top;
  var fw = 80;
  var fh = 60;
  if (sX && isFinite(sX.x)) fw = Math.max(24, Math.abs(sX.x - s0.x) * 2);
  if (sY && isFinite(sY.y)) fh = Math.max(20, Math.abs(sY.y - s0.y) * 2);
  return { cx: cx, cy: cy, width: fw, height: fh };
}

function hiResPeekCaptureHotspotFrameRect() {
  var el = hiResPeekOpeningHotspotEl || hiResPeekHotspotEl;

    if (cfg && hiResPeekShootMode(cfg) === 'macro') {
      return hiResPeekCaptureMacroFrameRect(cfg);
    }
    return null;
  }
  return {
    cx: r.left + r.width / 2 - vr.left,
    cy: r.top + r.height / 2 - vr.top,
    width: r.width,
    height: r.height
  };
}

function hiResPeekApplyLivePanoFrameFit(frameRect, cfg, keepZoom) {

  var stage = document.getElementById('hiResPeekMediaStage');

  hiResPeekViewState.zoomAnchorY = frameRect.cy;
  hiResPeekViewState.panX = Math.round((frameRect.cx - vw / 2) * 2) / 2;

function hiResPeekPasteBaseScale(vw, vh, iw, ih, cfg, backdropFovRad) {
  var yawDeg = Number(cfg.rangeAngleYaw);
  var pitchDeg = Number(cfg.rangeAnglePitch);
  if (!isFinite(yawDeg) || yawDeg <= 0) yawDeg = 28;
  if (!isFinite(pitchDeg) || pitchDeg <= 0) pitchDeg = 28;
  var yawRad = degToRad(yawDeg);
  var pitchRad = degToRad(pitchDeg);
  var aspect = vw / vh;
  var vFovRad = hiResPeekVerticalFovRad(backdropFovRad, aspect);
  var hTan = Math.tan(backdropFovRad / 2);
  var vTan = Math.tan(vFovRad / 2);
  if (hTan < 1e-6) hTan = 1e-6;
  if (vTan < 1e-6) vTan = 1e-6;
  var scaleW = (vw * Math.tan(yawRad / 2)) / (hTan * iw);
  var scaleH = (vh * Math.tan(pitchRad / 2)) / (vTan * ih);
  var boost = cfg.pasteScaleBoost != null ? Number(cfg.pasteScaleBoost) : 2;
  if (!isFinite(boost) || boost < 1) boost = 2;
  return Math.min(scaleW, scaleH) * boost;
}

function hiResPeekComputeAutoZoomTarget(cfg) {
  var zMax = hiResPeekZoomMax(cfg);
  if (cfg && cfg.autoZoomTarget != null) {
    var fixed = Number(cfg.autoZoomTarget);
    if (isFinite(fixed) && fixed > 1.01) return Math.min(zMax, fixed);
  }
  var view = document.getElementById('hiResPeekView');
  var img = document.getElementById('hiResPeekBaseImg');
  if (!view || !img || !img.naturalWidth) return 1.5;
  var vw = view.clientWidth || window.innerWidth;
  var vh = view.clientHeight || window.innerHeight;
  var iw = img.naturalWidth;
  var ih = img.naturalHeight;
  var base = hiResPeekViewState.baseScale;
  if (!base || base <= 0) return 1.5;
  var isMacro = hiResPeekShootMode(cfg) === 'macro';
  var fitMode = cfg && cfg.autoZoomFit ? String(cfg.autoZoomFit) :
    (isMacro ? 'height' : 'height');
  var zoomTarget;
  if (isMacro && hiResPeekKeepLivePanoActive) {
    zoomTarget = vh / (ih * base);
    return Math.max(0.15, Math.min(zMax, zoomTarget));
  } else if (fitMode === 'cover') {
    zoomTarget = Math.max(vw / (iw * base), vh / (ih * base));
  } else if (fitMode === 'contain') {
    zoomTarget = Math.min(vw / (iw * base), vh / (ih * base));
  } else {
    zoomTarget = vh / (ih * base);
    if (!isMacro && cfg && cfg.autoZoomHeightPad != null) {
      var hPad = Number(cfg.autoZoomHeightPad);
      if (isFinite(hPad) && hPad > 0 && hPad <= 1) zoomTarget *= hPad;
    }
  }
  if (cfg && cfg.autoZoomCoverPad != null && fitMode === 'cover') {
    var pad = Number(cfg.autoZoomCoverPad);
    if (isFinite(pad) && pad > 0) zoomTarget *= pad;
  }
  return Math.max(1.02, Math.min(zMax, zoomTarget));
}

function hiResPeekAutoZoomDurationMs(cfg) {
  var defMs = hiResPeekShootMode(cfg) === 'macro' ? 7500 : 10000;
  var baseMs = cfg && cfg.autoZoomMs != null ? Number(cfg.autoZoomMs) : defMs;
  if (!isFinite(baseMs) || baseMs < 400) baseMs = 10000;
  var speed = cfg && cfg.autoZoomSpeed != null ? Number(cfg.autoZoomSpeed) : 1;
  if (!isFinite(speed) || speed <= 0) speed = 1;
  return Math.round(baseMs / speed);
}

function hiResPeekVrWashMax(cfg) {
  var v = cfg && cfg.vrWashMax != null ? Number(cfg.vrWashMax) : 0.26;
  if (!isFinite(v) || v < 0) v = 0.26;
  return Math.min(0.42, v);
}

function hiResPeekApplyVrBackdropTone(t, cfg) {
  var wash = document.getElementById('hiResPeekVrWash');
  var pane = document.getElementById('hiResPeekVrPane');
  var u = Math.max(0, Math.min(1, t));
  var ease = u * u * (3 - 2 * u);
  var washMax = hiResPeekVrWashMax(cfg);
  if (wash) {
    wash.style.transition = 'none';
    wash.style.background = 'rgba(255, 255, 255, ' + (washMax * ease).toFixed(3) + ')';
  }
  if (pane) {
    if (ease <= 0.001) {
      pane.style.filter = '';
    } else {
      var b = 1 + 0.16 * ease;
      var s = 1 - 0.2 * ease;
      pane.style.filter = 'brightness(' + b.toFixed(3) + ') saturate(' + s.toFixed(3) + ') contrast(0.95)';
    }
  }
}

function hiResPeekResetVrBackdropTone() {
  var wash = document.getElementById('hiResPeekVrWash');
  var pane = document.getElementById('hiResPeekVrPane');
  if (wash) {
    wash.style.background = '';
    wash.style.transition = '';
  }
  if (pane) pane.style.filter = '';
}

function hiResPeekCancelAutoZoom() {
  if (hiResPeekAutoZoomAnim) {
    cancelAnimationFrame(hiResPeekAutoZoomAnim);
    hiResPeekAutoZoomAnim = null;
  }
}

function hiResPeekRevealFullScreenFade(cfg, baseImg) {
  hiResPeekCancelAutoZoom();
  hiResPeekApplyVrBackdropTone(1, cfg);
  if (!baseImg) {
    hiResPeekFinishZoomReveal(cfg);
    return;
  }
  baseImg.style.transition = 'opacity ' + (HI_RES_PEEK_FULL_FADE_MS / 1000) + 's ease-in';
  hiResPeekMacroSettleUntil = performance.now() + HI_RES_PEEK_FULL_FADE_MS + 400;
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      if (!hiResPeekOpen) return;
      baseImg.style.opacity = '1';
      setTimeout(function() {
        if (!hiResPeekOpen) return;
        hiResPeekFinishZoomReveal(cfg);
      }, HI_RES_PEEK_FULL_FADE_MS + 80);
    });
  });
}

function hiResPeekStartAutoZoom(cfg) {
  hiResPeekCancelAutoZoom();
  var baseImg = document.getElementById('hiResPeekBaseImg');
  var livePano = hiResPeekKeepLivePanoActive;
  if (!cfg || cfg.autoZoom === false) {
    return;
  }
  var targetZoom = hiResPeekComputeAutoZoomTarget(cfg);
  var duration = hiResPeekAutoZoomDurationMs(cfg);
  var isMacro = hiResPeekShootMode(cfg) === 'macro';
  var zMin = isMacro ? 0.15 : 1.01;
  if (!isFinite(targetZoom) || targetZoom < zMin) {
    hiResPeekApplyVrBackdropTone(1, cfg);
    if (baseImg) baseImg.style.opacity = '1';
    hiResPeekFinishZoomReveal(cfg);
    return;
  }
  if (livePano && isMacro) {
    console.log('🔍 接写ズーム: 開始幅' + Math.round((baseImg.naturalWidth || 0) * hiResPeekViewState.baseScale) +
      'px → ×' + targetZoom.toFixed(2));
  }
  var start = performance.now();
  var z0 = hiResPeekViewState.zoom || 1;
  var view = document.getElementById('hiResPeekView');
  if (!view) return;
  var panStartX = hiResPeekViewState.panX;
  var panStartY = hiResPeekViewState.panY;
  hiResPeekApplyVrBackdropTone(livePano ? 1 : 0, cfg);
  if (baseImg) {
    baseImg.style.transition = 'none';
    if (livePano) {
      baseImg.style.opacity = '1';
    } else if (isMacro) {
      baseImg.style.opacity = '0';
    } else {
      baseImg.style.opacity = '1';
    }
  }
  applyHiResPeekTransform();
  function frame(now) {
    if (!hiResPeekOpen) return;
    var t = Math.min(1, (now - start) / duration);
    var ease = t * t * (3 - 2 * t);
    var z1 = z0 + (targetZoom - z0) * ease;
    hiResPeekApplyZoomPan(z1, panStartX * (1 - ease), panStartY * (1 - ease));
    hiResPeekApplyVrBackdropTone(livePano ? 1 : t, cfg);
    if (baseImg && isMacro && !livePano) {
      baseImg.style.opacity = String(hiResPeekImageFadeOpacity(t));
    }
    if (t < 1) {
      hiResPeekAutoZoomAnim = requestAnimationFrame(frame);
    } else {
      hiResPeekAutoZoomAnim = null;
      hiResPeekViewState.zoomAnchorX = view.clientWidth / 2;
      hiResPeekViewState.zoomAnchorY = view.clientHeight / 2;
      hiResPeekApplyVrBackdropTone(1, cfg);
      if (baseImg) baseImg.style.opacity = '1';
      hiResPeekFinishZoomReveal(cfg);
    }
  }
  hiResPeekAutoZoomAnim = requestAnimationFrame(frame);
}

function hiResPeekTeardownVrBackdropPane() {
  var pane = document.getElementById('hiResPeekVrPane');
  var wash = document.getElementById('hiResPeekVrWash');
  if (hiResPeekVrBackdropViewer && hiResPeekVrBackdropScene) {
    try { hiResPeekVrBackdropViewer.destroyScene(hiResPeekVrBackdropScene); } catch (e1) {}
    hiResPeekVrBackdropScene = null;
  }
  if (pane) pane.style.display = 'none';
  if (wash) wash.style.display = 'none';
  hiResPeekResetVrBackdropTone();
  hiResPeekUnfreezeLivePanoView();
  hiResPeekViewState.backdropFovRad = 0;
}

function destroyHiResPeekHotspot() {
  if (currentView && currentView._hiResPeekViewStop) {
    try { currentView._hiResPeekViewStop(); } catch (e0) {}
  }
  hiResPeekViewRecent = false;
  clearTimeout(hiResPeekViewRecentTimer);
  if (hiResPeekHotspots.length && currentScene) {
    hiResPeekHotspots.forEach(function(item) {
      try { currentScene.hotspotContainer().destroyHotspot(item.handle); } catch (e) {}
    });
  } else if (window.hiResPeekHotspotHandle && currentScene) {
    try {
      currentScene.hotspotContainer().destroyHotspot(window.hiResPeekHotspotHandle);
    } catch (e) {}
  }
  window.hiResPeekHotspotHandle = null;
  hiResPeekHotspots = [];
  hiResPeekHotspotEl = null;
  hiResPeekActiveCfg = null;
  hiResPeekOpeningCfg = null;
  hiResPeekOpeningHotspotEl = null;
}

function hiResPeekShootMode(cfg) {
  var m = cfg && (cfg.shootMode || cfg.peekType) ? String(cfg.shootMode || cfg.peekType) : 'range';
  return m === 'macro' ? 'macro' : 'range';
}

function hiResPeekFrameViewThresholds(cfg) {
  if (cfg.showAngleYaw != null || cfg.showAnglePitch != null) {
    var yawTh = cfg.showAngleYaw != null ? Number(cfg.showAngleYaw) : 14;
    var pitchTh = cfg.showAnglePitch != null ? Number(cfg.showAnglePitch) : 10;
    if (hiResPeekShootMode(cfg) === 'macro') {
      yawTh = Math.max(14, yawTh);
      pitchTh = Math.max(14, pitchTh);
    }
    return { yaw: yawTh, pitch: pitchTh };
  }
  if (hiResPeekShootMode(cfg) === 'macro') {
    return { yaw: 14, pitch: 12 };
  }
  var size = hiResPeekEffectiveFrameSize(cfg);
  var r = cfg.frameRadius != null ? Number(cfg.frameRadius) : 900;
  return {
    yaw: Math.max(8, radToDeg(Math.atan((size.width * 0.5) / r)) + 4),
    pitch: Math.max(6, radToDeg(Math.atan((size.height * 0.5) / r)) + 3)
  };
}

function markPanoUserInteract() {
  hiResPeekInteractActive = true;
  showUI();
}

function hiResPeekEffectiveFrameSize(cfg) {
  var r = cfg.frameRadius != null ? Number(cfg.frameRadius) : 900;
  var fw = cfg.frameWidth != null ? Number(cfg.frameWidth) : 520;
  var fh = cfg.frameHeight != null ? Number(cfg.frameHeight) : 340;
  if (cfg.rangeAngleYaw != null && isFinite(Number(cfg.rangeAngleYaw))) {
    fw = Math.max(80, Math.round(2 * r * Math.tan(degToRad(Number(cfg.rangeAngleYaw)) / 2)));
  }
  if (cfg.rangeAnglePitch != null && isFinite(Number(cfg.rangeAnglePitch))) {
    fh = Math.max(60, Math.round(2 * r * Math.tan(degToRad(Number(cfg.rangeAnglePitch)) / 2)));
  }
  return { width: fw, height: fh };
}

function hiResPeekMaskClass(cfg) {
  var m = cfg && cfg.maskType ? String(cfg.maskType) : 'softRect';
  if (m === 'softEllipse' || m === 'softCircle' || m === 'fadeLight' || m === 'fadeDark') return 'mask-' + m;
  return 'mask-softRect';
}

function hiResPeekMagnifierSvg() {
  return '<svg viewBox="0 0 64 64" aria-hidden="true">' +
    '<circle cx="27" cy="27" r="17" fill="none" stroke="currentColor" stroke-width="4.5"/>' +
    '<line x1="40" y1="40" x2="56" y2="56" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>' +
    '</svg>';
}

function hiResPeekMaskStrengthRatio(cfg) {
  var s = cfg && cfg.maskStrength != null ? Number(cfg.maskStrength) : 65;
  if (!isFinite(s)) s = 65;
  return Math.max(15, Math.min(100, s)) / 100;
}

function applyHiResPeekMaskStyle(fill, cfg) {
  if (!fill || !cfg) return;
  var k = hiResPeekMaskStrengthRatio(cfg);
  var mask = hiResPeekMaskClass(cfg);
  if (mask === 'mask-fadeDark') {
    fill.style.background = 'rgba(0, 0, 0, ' + (0.1 + k * 0.38).toFixed(3) + ')';
    fill.style.boxShadow = 'none';
  } else if (mask === 'mask-fadeLight') {
    fill.style.background = 'rgba(255, 255, 255, ' + (0.08 + k * 0.42).toFixed(3) + ')';
    fill.style.boxShadow = 'none';
  } else {
    fill.style.background = 'rgba(255, 255, 255, ' + (0.06 + k * 0.36).toFixed(3) + ')';
    fill.style.boxShadow = 'inset 0 0 ' + Math.round(36 + k * 100) + 'px ' +
      Math.round(10 + k * 34) + 'px rgba(255, 255, 255, ' + (0.03 + k * 0.22).toFixed(3) + ')';
  }
}

function buildHiResPeekZoneElement(cfg, hostRef) {
  var isMacro = hiResPeekShootMode(cfg) === 'macro';
  var host = document.createElement('div');
  host.className = 'hires-peek-zone-host hires-peek-frame-hidden ' + (isMacro ? 'mode-macro' : 'mode-range');

  if (!isMacro) {
    var size = hiResPeekEffectiveFrameSize(cfg);
    var fw = size.width;
    var fh = size.height;
    host.style.width = Math.max(120, fw) + 'px';
    host.style.height = Math.max(80, fh) + 'px';
    var zone = document.createElement('div');
    zone.className = 'hires-peek-soft-zone tappable ' + hiResPeekMaskClass(cfg);
    var fill = document.createElement('div');
    fill.className = 'hires-peek-soft-fill';
    applyHiResPeekMaskStyle(fill, cfg);
    zone.appendChild(fill);
    host.appendChild(zone);
    bindPortalTap(zone, function() { openHiResPeekOverlay(cfg, host); });
  } else {
    host.style.width = '1px';
    host.style.height = '1px';
    host.style.overflow = 'visible';
  }

  var magColor = cfg.magnifierColor || (isMacro ? 'pink' : 'green');
  if (magColor !== 'pink' && magColor !== 'green' && magColor !== 'gold') {
    magColor = isMacro ? 'pink' : 'green';
  }
  var mag = document.createElement('div');
  mag.className = 'hires-peek-magnifier color-' + magColor;
  mag.setAttribute('aria-label', '高画質虫眼鏡');
  mag.innerHTML = hiResPeekMagnifierSvg();
  host.appendChild(mag);
  bindPortalTap(mag, function() { openHiResPeekOverlay(cfg, host); });
  if (hostRef) hostRef.el = host;
  return host;
}

function updateHiResPeekMapBtnVisibility() {
  if (!mapBtnEl) return;
  if (hiResPeekOpen) {
    mapBtnEl.classList.remove('visible');
    mapBtnEl.style.visibility = 'hidden';
    mapBtnEl.style.pointerEvents = 'none';
  } else {
    mapBtnEl.style.visibility = '';
    mapBtnEl.style.pointerEvents = '';
  }
}

function updateHiResPeekFrameVisibility() {
  updateHiResPeekMapBtnVisibility();
  if (!currentView) return;
  if (hiResPeekOpen) {
    hiResPeekHotspots.forEach(function(item) {
      item.el.classList.add('hires-peek-frame-hidden');
      item.el.classList.remove('hires-peek-blink');
    });
    if (hiResPeekHotspotEl) {
      hiResPeekHotspotEl.classList.add('hires-peek-frame-hidden');
      hiResPeekHotspotEl.classList.remove('hires-peek-blink');
    }
    return;
  }
  var yaw = radToDeg(normalizeAngle(currentView.parameters().yaw));
  var pitch = radToDeg(currentView.parameters().pitch);
  function applyOne(el, cfg) {
    if (!el || !cfg) return;
    var yawC = Number(cfg.yawCenter) || 0;
    var pitchC = Number(cfg.pitchCenter) || 0;
    var th = hiResPeekFrameViewThresholds(cfg);
    var inView = Math.abs(angleDiffDeg(yaw, yawC)) <= th.yaw && Math.abs(pitch - pitchC) <= th.pitch;
    var show = inView && (hiResPeekInteractActive || hiResPeekViewRecent);
    el.classList.toggle('hires-peek-frame-hidden', !show);
    el.classList.toggle('hires-peek-blink', show);
  }
  hiResPeekHotspots.forEach(function(item) { applyOne(item.el, item.cfg); });
}

function attachHiResPeekHotspot(sceneId, sceneData) {
  destroyHiResPeekHotspot();
  if (embedPlacerMode || embedShadowMode) return;
  var cfgs = getHiResPeekConfigs(sceneData);
  if (!cfgs.length || !currentScene) return;

  cfgs.forEach(function(cfg, idx) {
    var isMacro = hiResPeekShootMode(cfg) === 'macro';
    var wrap = buildHiResPeekZoneElement(cfg);
    wrap.style.zIndex = String(50 + idx);
    var yaw = degToRad(Number(cfg.yawCenter) || 0);
    var pitch = degToRad(Number(cfg.pitchCenter) || 0);
    var radius = cfg.frameRadius != null ? Number(cfg.frameRadius) : (isMacro ? 720 : 900);
    var handle = currentScene.hotspotContainer().createHotspot(
      wrap,
      { yaw: yaw, pitch: pitch },
      { perspective: { radius: radius } }
    );
    hiResPeekHotspots.push({ el: wrap, handle: handle, cfg: cfg });
    console.log('🔍 高画質覗き: ' + (isMacro ? '接写' : '範囲') + ' ' + (cfg.imageSrc || '') +
      ' 位置 左右' + (cfg.yawCenter || 0) + '° 上下' + (cfg.pitchCenter || 0) + '°' +
      ' / 出る±' + (cfg.showAngleYaw != null ? cfg.showAngleYaw : '?') + '°');
  });
  if (hiResPeekHotspots.length) {
    hiResPeekHotspotEl = hiResPeekHotspots[0].el;
    hiResPeekActiveCfg = hiResPeekHotspots[0].cfg;
    window.hiResPeekHotspotHandle = hiResPeekHotspots[0].handle;
  }
  if (currentView) {
    if (currentView._hiResPeekViewStop) {
      try { currentView._hiResPeekViewStop(); } catch (e0) {}
    }
    function onHiResPeekViewChange() {
      markHiResPeekViewRecent();
      updateHiResPeekFrameVisibility();
    }
    currentView.addEventListener('change', onHiResPeekViewChange);
    currentView._hiResPeekViewStop = function() {
      currentView.removeEventListener('change', onHiResPeekViewChange);
      currentView._hiResPeekViewStop = null;
    };
  }
  updateHiResPeekFrameVisibility();
}

function showHiResPeekHintFade() {
  showHiResPeekVrUi();
}

function hiResPeekZoomHintText(cfg) {
  if (cfg && cfg.peekZoomHint === false) return '';
  if (cfg && cfg.peekZoomHint) return String(cfg.peekZoomHint).trim();
  return 'マウスや指でもっと拡大！';
}

function hiResPeekClearZoomHintTimers() {
  clearTimeout(hiResPeekHintTimer);
  clearTimeout(hiResPeekHintHideTimer);
  hiResPeekHintTimer = null;
  hiResPeekHintHideTimer = null;
}

function hiResPeekHideZoomHint() {
  hiResPeekClearZoomHintTimers();
  var el = document.getElementById('hiResPeekZoomHint');
  if (!el) return;
  el.style.opacity = '0';
  el.hidden = true;
  el.style.display = 'none';
  el.textContent = '';
}

function hiResPeekShowZoomHint(cfg) {
  var text = hiResPeekZoomHintText(cfg);
  if (!text || !hiResPeekOpen) return;
  var el = document.getElementById('hiResPeekZoomHint');
  if (!el) return;
  hiResPeekClearZoomHintTimers();
  el.textContent = text;
  el.hidden = false;
  el.style.display = 'block';
  el.style.transition = 'none';
  el.style.opacity = '0';
  hiResPeekHintTimer = setTimeout(function() {
    if (!hiResPeekOpen || el.hidden) return;
    el.style.transition = 'opacity ' + (HI_RES_PEEK_ZOOM_HINT_FADE_MS / 1000) + 's ease-in-out';
    el.style.opacity = '1';
    hiResPeekHintTimer = setTimeout(function() {
      if (!hiResPeekOpen) return;
      el.style.opacity = '0';
      hiResPeekHintHideTimer = setTimeout(function() {
        if (el) {
          el.hidden = true;
          el.style.display = 'none';
          el.textContent = '';
        }
      }, HI_RES_PEEK_ZOOM_HINT_FADE_MS);
    }, HI_RES_PEEK_ZOOM_HINT_HOLD_MS);

}

function hiResPeekFinishZoomReveal(cfg) {
  var stage = document.getElementById('hiResPeekMediaStage');
  if (stage) stage.style.willChange = 'auto';
  hiResPeekPlayOverlayVideo(true);
  hiResPeekShowZoomHint(cfg);
}

function showHiResPeekVrUi() {
  if (!hiResPeekOpen || !hiResPeekVrBtnEl) return;
  hiResPeekVrBtnEl.classList.add('visible');
  clearTimeout(hiResPeekUiTimeout);
  hiResPeekUiTimeout = setTimeout(function() {
    if (hiResPeekVrBtnEl) hiResPeekVrBtnEl.classList.remove('visible');
  }, 3000);
}

function hideHiResPeekVrUi() {
  clearTimeout(hiResPeekUiTimeout);
  if (hiResPeekVrBtnEl) hiResPeekVrBtnEl.classList.remove('visible');
}

function getHiResPeekConfigs(sceneData) {
  if (!sceneData) return [];
  if (sceneData.hiResPeeks && Array.isArray(sceneData.hiResPeeks)) {
    return sceneData.hiResPeeks.filter(function(p) { return p && p.imageSrc; }).slice(0, HI_RES_PEEK_MAX);
  }
  var p = sceneData.hiResPeek;
  return (p && p.imageSrc) ? [p] : [];
}

function getHiResPeekConfig(sceneData) {
  if (hiResPeekOpen && hiResPeekOpeningCfg) return hiResPeekOpeningCfg;
  var list = getHiResPeekConfigs(sceneData);
  return list.length ? list[0] : null;
}

function hiResPeekIosVideoSrc(cfg) {
  if (!cfg) return '';
  if (cfg.videoSrcIos) return String(cfg.videoSrcIos);
  var s = String(cfg.videoSrc || '');
  if (!s) return '';
  if (/\.webm$/i.test(s)) return s.replace(/\.webm$/i, '.mp4');
  return s;
}

function hiResPeekVideoConfig(cfg) {
  if (!cfg || !cfg.videoSrc) return null;
  return {
    src: String(cfg.videoSrc),
    srcIos: hiResPeekIosVideoSrc(cfg),
    xPct: cfg.videoX != null && isFinite(cfg.videoX) ? Number(cfg.videoX) : 50,
    yPct: cfg.videoY != null && isFinite(cfg.videoY) ? Number(cfg.videoY) : 50,
    widthPct: cfg.videoWidth != null && isFinite(cfg.videoWidth) ? Number(cfg.videoWidth) : 18,
    matte: cfg.videoMatte === 'none' ? 'none' : 'lighten',
    loop: cfg.videoLoop !== false
  };
}

function hiResPeekFootShadowConfig(cfg) {
  if (!cfg || cfg.footShadow !== true || !cfg.footShadowImage) return null;
  var fc = cfg.footShadowConfig && typeof cfg.footShadowConfig === 'object' ? cfg.footShadowConfig : {};
  return {
    image: String(cfg.footShadowImage),
    opacity: fc.opacity != null && isFinite(fc.opacity) ? Number(fc.opacity) : 0.35,
    blurPx: fc.blurPx != null && isFinite(fc.blurPx) ? Number(fc.blurPx) : 4
  };
}

function syncHiResPeekShadowLayer(cfg) {
  var wrap = document.getElementById('hiResPeekShadowWrap');
  var img = document.getElementById('hiResPeekShadowImg');
  var baseImg = document.getElementById('hiResPeekBaseImg');
  if (!wrap || !img || !baseImg) return;
  var sc = hiResPeekFootShadowConfig(cfg);
  if (!sc) {
    wrap.hidden = true;
    img.removeAttribute('src');
    img.style.opacity = '';
    img.style.filter = 'none';
    return;
  }
  var iw = baseImg.naturalWidth || parseInt(baseImg.style.width, 10) || 0;
  var ih = baseImg.naturalHeight || parseInt(baseImg.style.height, 10) || 0;
  if (!iw || !ih) return;
  wrap.hidden = false;
  wrap.style.left = '0';
  wrap.style.top = '0';
  wrap.style.width = iw + 'px';
  wrap.style.height = ih + 'px';
  img.style.width = '100%';
  img.style.height = '100%';
  img.style.opacity = String(Math.max(0.01, Math.min(1, sc.opacity)));
  img.style.filter = sc.blurPx > 0 ? ('blur(' + sc.blurPx + 'px)') : 'none';
  img.src = hiResPeekMediaUrl(sc.image);
}

function hiResPeekMediaUrl(src) {
  var s = String(src || '');
  if (!s) return s;
  if (s.indexOf('?') < 0) s += '?v=' + encodeURIComponent(BUILD_STAMP);
  else s += '&v=' + encodeURIComponent(BUILD_STAMP);
  return s;
}

function hiResPeekImageUrl(src) {
  return hiResPeekMediaUrl(src);
}

function appendHiResPeekVideoSources(vid, vc) {
  if (!vid || !vc) return;
  while (vid.firstChild) vid.removeChild(vid.firstChild);
  vid.removeAttribute('src');
  vid.loop = vc.loop !== false;
  vid.muted = true;
  if (typeof guideDeviceIsIosSafari === 'function' && guideDeviceIsIosSafari() && vc.srcIos) {
    vid.src = hiResPeekMediaUrl(vc.srcIos);
    return;
  }
  var s = document.createElement('source');
  s.src = hiResPeekMediaUrl(vc.src);
  if (/\.webm$/i.test(vc.src)) s.type = 'video/webm';
  else s.type = 'video/mp4';
  vid.appendChild(s);
}

function syncHiResPeekVideoLayout(cfg) {
  var wrap = document.getElementById('hiResPeekVideoWrap');
  var vid = document.getElementById('hiResPeekOverlayVideo');
  var stage = document.getElementById('hiResPeekMediaStage');
  var img = document.getElementById('hiResPeekBaseImg');
  if (!wrap || !vid || !stage || !img) return;
  var vc = hiResPeekVideoConfig(cfg);
  if (!vc) {
    wrap.hidden = true;
    try { vid.pause(); } catch (e0) {}
    syncHiResPeekShadowLayer(cfg);
    return;
  }
  wrap.hidden = false;
  var matte = vc.matte === 'none' ? 'normal' : vc.matte;
  if (matte === 'normal' && typeof guideDeviceIsIosSafari === 'function' && guideDeviceIsIosSafari() && vc.srcIos && vc.srcIos !== vc.src) {
    matte = 'lighten';
  }
  wrap.className = 'hi-res-peek-video-wrap matte-' + matte;
  var iw = img.naturalWidth || parseInt(img.style.width, 10) || stage.clientWidth;
  var ih = img.naturalHeight || parseInt(img.style.height, 10) || stage.clientHeight;
  if (!iw || !ih) {
    syncHiResPeekShadowLayer(cfg);
    return;
  }
  var w = Math.max(8, iw * vc.widthPct / 100);
  var ar = vid.videoWidth > 0 && vid.videoHeight > 0 ? vid.videoHeight / vid.videoWidth : 1.35;
  var h = w * ar;
  var x = iw * vc.xPct / 100 - w / 2;
  var y = ih * vc.yPct / 100 - h / 2;
  wrap.style.left = x + 'px';
  wrap.style.top = y + 'px';
  wrap.style.width = w + 'px';
  wrap.style.height = h + 'px';
  if (hiResPeekVideoPlayPending) wrap.style.opacity = '0';
  syncHiResPeekShadowLayer(cfg);
}

function hiResPeekPlayOverlayVideo(withFade) {
  if (!hiResPeekOpen) return;
  var vid = document.getElementById('hiResPeekOverlayVideo');
  var wrap = document.getElementById('hiResPeekVideoWrap');
  if (!vid) return;
  if (!vid.currentSrc && !vid.src && !vid.querySelector('source')) return;
  hiResPeekVideoPlayPending = false;
  if (wrap && !wrap.hidden && withFade) {
    wrap.style.transition = 'opacity ' + (HI_RES_PEEK_VIDEO_FADE_MS / 1000) + 's ease-in-out';
    wrap.style.opacity = '0';
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        if (!hiResPeekOpen || wrap.hidden) return;
        wrap.style.opacity = '1';
      });
    });
  }
  var p = vid.play();
  if (p && p.catch) p.catch(function() {});
}

function setupHiResPeekOverlayVideo(cfg, opts) {
  opts = opts || {};
  var deferPlay = !!opts.deferPlay;
  var vid = document.getElementById('hiResPeekOverlayVideo');
  if (!vid) return;
  var vc = hiResPeekVideoConfig(cfg);
  if (!vc) {
    syncHiResPeekVideoLayout(cfg);
    return;
  }
  hiResPeekVideoPlayPending = deferPlay;
  appendHiResPeekVideoSources(vid, vc);
  var wrap = document.getElementById('hiResPeekVideoWrap');
  if (wrap && deferPlay) {
    wrap.style.opacity = '0';
    wrap.style.transition = 'none';
  }
  function onMeta() {
    syncHiResPeekVideoLayout(cfg);
    if (!deferPlay) hiResPeekPlayOverlayVideo(true);
  }
  vid.onloadedmetadata = onMeta;
  vid.onended = function() {
    if (!wrap || wrap.hidden) return;
    wrap.style.transition = 'opacity ' + (HI_RES_PEEK_VIDEO_FADE_MS / 1000) + 's ease-out';
    wrap.style.opacity = '0';
  };
  vid.onerror = function() {
    console.warn('⚠️ 高画質覗き動画を読み込めません:', vc.src);
  };
  try { vid.load(); } catch (e1) {}
  if (vid.readyState >= 1) onMeta();
}

function teardownHiResPeekOverlayVideo() {
  var vid = document.getElementById('hiResPeekOverlayVideo');
  var wrap = document.getElementById('hiResPeekVideoWrap');
  var shadowWrap = document.getElementById('hiResPeekShadowWrap');
  var shadowImg = document.getElementById('hiResPeekShadowImg');
  if (!vid) return;
  try { vid.pause(); } catch (e0) {}
  vid.removeAttribute('src');
  while (vid.firstChild) vid.removeChild(vid.firstChild);
  vid.onloadedmetadata = null;
  vid.onended = null;
  if (wrap) {
    wrap.hidden = true;
    wrap.style.opacity = '';
    wrap.style.transition = '';
  }
  if (shadowWrap) shadowWrap.hidden = true;
  if (shadowImg) shadowImg.removeAttribute('src');
}

function applyHiResPeekTransform() {
  var stage = document.getElementById('hiResPeekMediaStage');
  if (!stage) return;
  var s = hiResPeekViewState.baseScale * hiResPeekViewState.zoom;
  s = Math.round(s * 8192) / 8192;
  var px = Math.round(hiResPeekViewState.panX * 2) / 2;
  var py = Math.round(hiResPeekViewState.panY * 2) / 2;
  stage.style.left = '50%';
  stage.style.top = '50%';
  stage.style.transform = 'translate3d(calc(-50% + ' + px + 'px), calc(-50% + ' + py + 'px), 0) scale(' + s + ')';
}

function fitHiResPeekImage(keepZoom) {
  var view = document.getElementById('hiResPeekView');
  var stage = document.getElementById('hiResPeekMediaStage');
  var img = document.getElementById('hiResPeekBaseImg');
  if (!view || !stage || !img || !img.naturalWidth) return;
  var vw = view.clientWidth || window.innerWidth;
  var vh = view.clientHeight || window.innerHeight;
  if (!vw || !vh) {
    requestAnimationFrame(function() { fitHiResPeekImage(keepZoom); });
    return;
  }
  var iw = img.naturalWidth;
  var ih = img.naturalHeight;
  var cfg = hiResPeekActiveCfgOrScene();
  var usePaste = cfg && hiResPeekUsePasteMode(cfg) && hiResPeekViewState.backdropFovRad > 0;
  if (usePaste) {
    if (hiResPeekShootMode(cfg) === 'macro') {
      hiResPeekViewState.baseScale = hiResPeekMacroStartWidthPx(cfg, vw) / iw;
    } else {
      hiResPeekViewState.baseScale = hiResPeekPasteBaseScale(
        vw, vh, iw, ih, cfg, hiResPeekViewState.backdropFovRad);
    }
  } else {
    hiResPeekViewState.baseScale = Math.min(vw / iw, vh / ih);
  }
  if (!keepZoom) {
    hiResPeekViewState.zoom = 1;
    hiResPeekViewState.panX = 0;
    hiResPeekViewState.panY = 0;
  }
  stage.style.width = iw + 'px';
  stage.style.height = ih + 'px';
  img.style.position = 'absolute';
  img.style.left = '0';
  img.style.top = '0';
  img.style.width = iw + 'px';
  img.style.height = ih + 'px';
  img.style.visibility = '';
  if (!(hiResPeekOpen && hiResPeekKeepLivePanoActive) &&
      !(hiResPeekOpen && hiResPeekAutoZoomAnim)) {
    img.style.opacity = '1';
  }
  syncHiResPeekVideoLayout(cfg);
  applyHiResPeekTransform();
  console.log('🔍 高画質覗き:', usePaste ? 'VRに貼り付け' : '全体表示', iw + '×' + ih);
}

function hiResPeekZoomMax(cfg) {
  return (cfg && hiResPeekShootMode(cfg) === 'macro') ? 25 : 5;
}

function hiResPeekFadeInMacroImage(baseImg) {
  if (!baseImg) return;
  baseImg.style.transition = 'none';
  baseImg.style.opacity = '0';
  void baseImg.offsetWidth;
  baseImg.style.transition = 'opacity ' + (HI_RES_PEEK_MACRO_FADE_MS / 1000) + 's ease-in';
  baseImg.style.opacity = '1';
}

function setHiResPeekZoom(nextZoom, anchorX, anchorY, fromAutoZoom) {
  if (!fromAutoZoom) hiResPeekCancelAutoZoom();
  var view = document.getElementById('hiResPeekView');
  var img = document.getElementById('hiResPeekBaseImg');
  if (!view || !img || !img.naturalWidth) return;
  var cfg = hiResPeekActiveCfgOrScene();
  var z0 = hiResPeekViewState.zoom;
  var zMin = (cfg && hiResPeekShootMode(cfg) === 'macro') ? 0.15 : 1;
  var z1 = Math.max(zMin, Math.min(hiResPeekZoomMax(cfg), nextZoom));
  if (z1 === z0) return;
  var vw = view.clientWidth;
  var vh = view.clientHeight;
  var cx = anchorX != null ? anchorX : vw / 2;
  var cy = anchorY != null ? anchorY : vh / 2;
  var s0 = hiResPeekViewState.baseScale * z0;
  var s1 = hiResPeekViewState.baseScale * z1;
  var ix = (cx - vw / 2 - hiResPeekViewState.panX) / s0;
  var iy = (cy - vh / 2 - hiResPeekViewState.panY) / s0;
  hiResPeekViewState.zoom = z1;
  hiResPeekViewState.panX = Math.round((cx - vw / 2 - ix * s1) * 2) / 2;
  hiResPeekViewState.panY = Math.round((cy - vh / 2 - iy * s1) * 2) / 2;
  applyHiResPeekTransform();
}

function openHiResPeekOverlay(cfg, hotspotEl) {
  if (!cfg) {
    var list = currentSceneObj ? getHiResPeekConfigs(currentSceneObj.data) : [];
    cfg = list.length ? list[0] : null;
  }
  if (!cfg || hiResPeekOpen) return;
  hiResPeekOpeningCfg = cfg;
  hiResPeekOpeningHotspotEl = hotspotEl || null;
  hiResPeekActiveCfg = cfg;
  if (hotspotEl) hiResPeekHotspotEl = hotspotEl;
  var overlay = document.getElementById('hiResPeekOverlay');
  var baseImg = document.getElementById('hiResPeekBaseImg');
  if (!overlay || !baseImg) return;
  var isMacroOpen = hiResPeekShootMode(cfg) === 'macro';
  var keepLive = hiResPeekKeepLivePano(cfg);
  hiResPeekKeepLivePanoActive = keepLive;
  hiResPeekViewState.macroAnchorX = null;
  hiResPeekViewState.macroAnchorY = null;
  hiResPeekMacroSettleUntil = 0;
  hiResPeekOpen = true;
  var stageEl = document.getElementById('hiResPeekMediaStage');
  if (stageEl) stageEl.style.willChange = 'transform';
  if (!keepLive) {
    document.body.classList.add('hi-res-peek-active');
  }
  overlay.setAttribute('aria-hidden', 'false');
  overlay.style.display = 'block';
  hiResPeekSetupPeekBackground(cfg);
  if (keepLive) {
    hiResPeekLiveFrameRect = hiResPeekCaptureHotspotFrameRect();
    if (!hiResPeekLiveFrameRect && isMacroOpen) {
      hiResPeekLiveFrameRect = hiResPeekCaptureMacroFrameRect(cfg);
    }
    hiResPeekFreezeLivePanoView();
  }
  updateHiResPeekFrameVisibility();
  document.body.classList.remove('hi-res-peek-fast-out');
  baseImg.style.opacity = '0';
  var useZoom = cfg.autoZoom !== false;
  baseImg.style.transition = 'none';
  var deferVideo = !!(cfg && (cfg.videoSrc || cfg.videoSrcIos));
  var expectedImage = String(cfg.imageSrc || '');
  var imageReadyDone = false;
  function showHiResPeekImageReady() {
    if (imageReadyDone || !hiResPeekOpen) return;
    if (!baseImg.naturalWidth || !baseImg.naturalHeight) return;
    var srcNow = baseImg.currentSrc || baseImg.src || '';
    if (expectedImage && srcNow.indexOf(expectedImage) < 0) return;
    imageReadyDone = true;
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        if (!hiResPeekOpen) return;
        fitHiResPeekImage(false);
        if (!useZoom) {
          hiResPeekApplyFullHeightZoom(cfg);
          applyHiResPeekTransform();
        } else {
          var laidOut = false;
          if (keepLive && hiResPeekLiveFrameRect) {
            laidOut = hiResPeekApplyLivePanoFrameFit(hiResPeekLiveFrameRect, cfg, false);
          }
          if (!laidOut && isMacroOpen) {
            laidOut = hiResPeekSetupMacroPasteLayout(cfg, baseImg, false);
          }
        }
        setupHiResPeekOverlayVideo(cfg, { deferPlay: deferVideo });
        syncHiResPeekShadowLayer(cfg);
        if (keepLive) {
          if (isMacroOpen) hiResPeekFadeInMacroImage(baseImg);
          else {
            baseImg.style.transition = 'opacity ' + (HI_RES_PEEK_MACRO_FADE_MS / 1000) + 's ease-out';
            requestAnimationFrame(function() {
              if (!hiResPeekOpen) return;
              baseImg.style.opacity = '1';
            });
          }
        } else {
          baseImg.style.transition = 'opacity ' + (HI_RES_PEEK_MACRO_FADE_MS / 1000) + 's ease-out';
          baseImg.style.opacity = '1';
        }
        var revealDelay = (keepLive && isMacroOpen) ? (HI_RES_PEEK_MACRO_FADE_MS + 200) : 300;
        if (!useZoom) {
          hiResPeekApplyVrBackdropTone(1, cfg);
          hiResPeekMacroSettleUntil = performance.now() + revealDelay + 400;
          setTimeout(function() {
            if (!hiResPeekOpen) return;
            hiResPeekFinishZoomReveal(cfg);
          }, revealDelay);
          return;
        }
        var zoomDelay = (keepLive && isMacroOpen) ? (HI_RES_PEEK_MACRO_FADE_MS + 200) : (keepLive ? 100 : 200);
        if (keepLive && isMacroOpen) {
          hiResPeekMacroSettleUntil = performance.now() + zoomDelay + hiResPeekAutoZoomDurationMs(cfg) + 400;
        }
        setTimeout(function() {
          if (!hiResPeekOpen) return;
          if (!keepLive && !isMacroOpen) baseImg.style.opacity = '1';
          hiResPeekStartAutoZoom(cfg);
        }, zoomDelay);
      });
    });
  }
  baseImg.onerror = function() {
    if (!hiResPeekOpen) return;
    var layers = cfg.layerSrcs || cfg.layers;
    if (layers && layers.length) {
      var alt = String(layers[0] || '').trim();
      if (alt && alt !== expectedImage) {
        console.warn('⚠️ 高画質画像を読み込めません。代替:', alt);
        expectedImage = alt;
        imageReadyDone = false;
        baseImg.src = hiResPeekImageUrl(expectedImage);
        return;
      }
    }
    console.warn('⚠️ 高画質画像を読み込めません:', expectedImage);
    closeHiResPeekOverlay();
  };
  baseImg.onload = showHiResPeekImageReady;
  try { baseImg.removeAttribute('src'); } catch (eClr) {}
  void baseImg.offsetWidth;
  baseImg.src = hiResPeekImageUrl(expectedImage);
  requestAnimationFrame(function() {
    overlay.classList.add('open');
    playHiResPeekBgm(cfg);
  });
  showHiResPeekHintFade();
}

function closeHiResPeekOverlay() {
  var overlay = document.getElementById('hiResPeekOverlay');
  var baseImg = document.getElementById('hiResPeekBaseImg');
  if (!overlay) return;
  hiResPeekOpen = false;
  hiResPeekHideZoomHint();
  hiResPeekUnfreezeLivePanoView();
  try { viewer.controls().enable(); } catch (eEn) {}
  hiResPeekOpeningCfg = null;
  hiResPeekOpeningHotspotEl = null;
  hiResPeekCancelAutoZoom();
  stopHiResPeekBgm();
  restoreBgmAfterVideo();
  hiResPeekVideoPlayPending = false;
  hiResPeekPanDrag = null;
  hiResPeekPinch = null;
  hideHiResPeekVrUi();
  teardownHiResPeekOverlayVideo();
  document.body.classList.add('hi-res-peek-fast-out');
  document.body.classList.remove('hi-res-peek-active');
  overlay.classList.remove('open');
  if (baseImg) {
    baseImg.style.transition = 'opacity 0.75s ease-in-out';
    baseImg.style.opacity = '0';
    baseImg.style.visibility = '';
  }
  setTimeout(function() {
    if (!hiResPeekOpen) {
      hiResPeekTeardownVrBackdropPane();
      overlay.setAttribute('aria-hidden', 'true');
      overlay.style.display = 'none';
      document.body.classList.remove('hi-res-peek-fast-out');
    }
  }, HI_RES_PEEK_FADE_OUT_MS);
  updateHiResPeekFrameVisibility();
}

function bindHiResPeekUi() {
  var overlay = document.getElementById('hiResPeekOverlay');
  var view = document.getElementById('hiResPeekView');
  hiResPeekVrBtnEl = document.getElementById('hiResPeekVrBtn');
  if (!overlay || !view || !hiResPeekVrBtnEl) return;

  hiResPeekVrBtnEl.addEventListener('click', function(e) {
    e.stopPropagation();
    closeHiResPeekOverlay();
  });
  overlay.addEventListener('mousemove', showHiResPeekVrUi);
  overlay.addEventListener('touchstart', showHiResPeekVrUi, { passive: true });
  window.addEventListener('keydown', function(e) {
    if (!hiResPeekOpen) return;
    if (e.key === 'Escape' || e.key === 'Esc') {
      e.preventDefault();
      closeHiResPeekOverlay();
    }
  });

  function touchDistance(touches) {
    var dx = touches[0].clientX - touches[1].clientX;
    var dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  view.addEventListener('mousedown', function(e) {
    if (!hiResPeekOpen || e.button !== 0) return;
    hiResPeekCancelAutoZoom();
    showHiResPeekVrUi();
    hiResPeekPanDrag = { x0: e.clientX, y0: e.clientY, panX: hiResPeekViewState.panX, panY: hiResPeekViewState.panY };
    view.classList.add('is-dragging');
    e.preventDefault();
  });
  window.addEventListener('mousemove', function(e) {
    if (!hiResPeekPanDrag) return;
    hiResPeekViewState.panX = hiResPeekPanDrag.panX + (e.clientX - hiResPeekPanDrag.x0);
    hiResPeekViewState.panY = hiResPeekPanDrag.panY + (e.clientY - hiResPeekPanDrag.y0);
    applyHiResPeekTransform();
  });
  window.addEventListener('mouseup', function() {
    if (!hiResPeekPanDrag) return;
    hiResPeekPanDrag = null;
    view.classList.remove('is-dragging');
  });

  view.addEventListener('wheel', function(e) {
    if (!hiResPeekOpen) return;
    e.preventDefault();
    showHiResPeekVrUi();
    var rect = view.getBoundingClientRect();
    var delta = e.deltaY < 0 ? 0.12 : -0.12;
    setHiResPeekZoom(hiResPeekViewState.zoom + delta, e.clientX - rect.left, e.clientY - rect.top);
  }, { passive: false });

  view.addEventListener('touchstart', function(e) {
    if (!hiResPeekOpen) return;
    hiResPeekCancelAutoZoom();
    showHiResPeekVrUi();
    if (e.touches.length === 2) {
      hiResPeekPinch = {
        dist: touchDistance(e.touches),
        zoom: hiResPeekViewState.zoom,
        midX: (e.touches[0].clientX + e.touches[1].clientX) / 2,
        midY: (e.touches[0].clientY + e.touches[1].clientY) / 2,
        rect: view.getBoundingClientRect()
      };
      hiResPeekPanDrag = null;
    } else if (e.touches.length === 1) {
      var t = e.touches[0];
      hiResPeekPanDrag = { x0: t.clientX, y0: t.clientY, panX: hiResPeekViewState.panX, panY: hiResPeekViewState.panY };
      hiResPeekPinch = null;
    }
  }, { passive: true });

  view.addEventListener('touchmove', function(e) {
    if (!hiResPeekOpen) return;
    if (hiResPeekPinch && e.touches.length >= 2) {
      e.preventDefault();
      var dist = touchDistance(e.touches);
      var rect = hiResPeekPinch.rect;
      var midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
      var midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
      setHiResPeekZoom(hiResPeekPinch.zoom * (dist / hiResPeekPinch.dist), midX, midY);
    } else if (hiResPeekPanDrag && e.touches.length === 1) {
      e.preventDefault();
      var t0 = e.touches[0];
      hiResPeekViewState.panX = hiResPeekPanDrag.panX + (t0.clientX - hiResPeekPanDrag.x0);
      hiResPeekViewState.panY = hiResPeekPanDrag.panY + (t0.clientY - hiResPeekPanDrag.y0);
      applyHiResPeekTransform();
    }
  }, { passive: false });

  view.addEventListener('touchend', function() {
    hiResPeekPanDrag = null;
    hiResPeekPinch = null;
    view.classList.remove('is-dragging');
  });

  window.addEventListener('resize', function() {
    if (!hiResPeekOpen) return;
    if (hiResPeekAutoZoomAnim || performance.now() < hiResPeekMacroSettleUntil) return;
    var cfg = hiResPeekActiveCfgOrScene();
    if (hiResPeekKeepLivePanoActive && cfg && hiResPeekShootMode(cfg) === 'macro') return;
    var img = document.getElementById('hiResPeekBaseImg');
    if (hiResPeekKeepLivePanoActive && cfg && img) {
      if (hiResPeekLiveFrameRect) {
        hiResPeekApplyLivePanoFrameFit(hiResPeekLiveFrameRect, cfg, true);
      } else {
        fitHiResPeekImage(true);
      }
    } else {
      fitHiResPeekImage(true);
    }
  });
}

function unlockAudioAndPlayBgm() {

  audioEnabled = true;
  audioUnlockConsumed = true;
  try {
    if (typeof getSharedBgmAudioContext === 'function') getSharedBgmAudioContext().resume();
  } catch (eUnlock) {}
  if (!currentSceneObj || !shouldPlayBGM()) return;
  var sceneNarrMissing = !Object.keys(bgmAudios).some(function(k) {
