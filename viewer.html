function angleDiffDeg(a, b) {
  var diff = a - b;
  while (diff > 180) diff -= 360;
  while (diff < -180) diff += 360;
  return diff;
}

function legacyPortalCenterRange(ih) {
  var ymin = typeof ih.yawMin === 'number' && !isNaN(ih.yawMin) ? ih.yawMin : 0;
  var ymax = typeof ih.yawMax === 'number' && !isNaN(ih.yawMax) ? ih.yawMax : ymin;
  var center = normalizeAngle(degToRad((ymin + angleDiffDeg(ymax, ymin) / 2))) * 180 / Math.PI;
  var range = Math.abs(angleDiffDeg(ymax, ymin)) / 2;
  return { center: center, range: range };
}

function portalHasRenderableMedia(ih) {
  if (!ih) return false;
  if (ih.openInLook) return true;
  if (ih.src && String(ih.src).trim()) return true;
  if (ih.videoSrc && String(ih.videoSrc).trim()) return true;
  if (ih.frameSequence && resolveFrameSequenceUrls(ih.frameSequence).length) return true;
  return false;
}

function portalCenterDeg(ih) {
  if (typeof ih.yawCenter === 'number' && !isNaN(ih.yawCenter)) return ih.yawCenter;
  return legacyPortalCenterRange(ih).center;
}

function portalRangeDeg(ih) {
  if (typeof ih.yawRange === 'number' && !isNaN(ih.yawRange)) return Math.max(0, ih.yawRange);
  return legacyPortalCenterRange(ih).range;
}

function portalPlacementYawRad(ih) {
  return degToRad(portalCenterDeg(ih));
}

function portalCenterPitchDeg(ih) {
  if (ih == null || ih.pitchCenter == null || ih.pitchCenter === '') return 0;
  var n = Number(ih.pitchCenter);
  return isFinite(n) ? n : 0;
}

function portalPitchRangeDeg(ih) {
  if (typeof ih.pitchRange === 'number' && !isNaN(ih.pitchRange)) return Math.max(0, ih.pitchRange);
  return Math.max(15, portalRangeDeg(ih));
}

function portalPlacementPitchRad(ih) {
  return degToRad(portalCenterPitchDeg(ih));
}

/** 旧 data.js で度数のまま入っている targetYaw/targetPitch を補正 */
function normalizePortalTargetRad(val, isPitch) {
  if (val == null || val === '' || !isFinite(Number(val))) return undefined;
  var n = Number(val);
  var limit = isPitch ? (Math.PI / 2 + 0.01) : (Math.PI + 0.01);
  if (Math.abs(n) > limit) return degToRad(n);
  return n;
}

function resolvePortalTargetView(ih) {
  if (!ih) return { yaw: undefined, pitch: undefined };
  var yaw = normalizePortalTargetRad(ih.targetYaw, false);
  var pitch = normalizePortalTargetRad(ih.targetPitch, true);
  if (yaw === undefined && ih.targetYaw === 0) yaw = 0;
  if (pitch === undefined && ih.targetPitch === 0) pitch = 0;
  return { yaw: yaw, pitch: pitch };
}

function portalDispMs(ih) {

var PORTAL_VIEW_RANGE_BOOST = 1.28;
var PORTAL_TAP_MOVE_TOLERANCE_PX = 18;

function portalCanTap(hs) {
  if (!hs || !hs.ih) return false;
  return !!(hs.portalActive || hs.portalFadingOut);

var portalDiveAnimToken = 0;

function easeOutCubic01(t) {
  t = Math.max(0, Math.min(1, t));
  return 1 - Math.pow(1 - t, 3);
}

function isPortalDiveTransition(ih) {
  if (!ih) return false;
  if (ih.transition === 'dive' || ih.portalTransition === 'dive') return true;
  return ih.effect === 'portalDive';
}

function portalDiveFovRad(ih, which) {
  var radKey = which === 'start' ? 'diveStartFov' : 'diveEndFov';
  var degKey = which === 'start' ? 'diveStartFovDeg' : 'diveEndFovDeg';
  if (ih && ih[radKey] != null && isFinite(ih[radKey])) return ih[radKey];
  if (ih && ih[degKey] != null && isFinite(ih[degKey])) return degToRad(ih[degKey]);
  if (which === 'start') return degToRad(28);
  return null;
}

function resolvePortalDiveEndFov(ih, targetSceneId) {
  var end = portalDiveFovRad(ih, 'end');
  if (end != null) return end;
  var obj = scenesData[targetSceneId];
  if (obj && obj.data.initialViewParameters && obj.data.initialViewParameters.fov != null) {
    return obj.data.initialViewParameters.fov;
  }
  return currentView ? currentView.parameters().fov : degToRad(66);
}

function animateViewFov(view, fromFov, toFov, durationMs, token) {
  if (!view) return;
  if (!durationMs || durationMs <= 0) {
    view.setParameters({ fov: toFov });
    return;
  }
  var start = performance.now();
  var yaw = view.parameters().yaw;
  var pitch = view.parameters().pitch;
  function tick(now) {
    if (token !== portalDiveAnimToken) return;
    var t = easeOutCubic01(Math.min(1, (now - start) / durationMs));
    view.setParameters({
      yaw: yaw,
      pitch: pitch,
      fov: fromFov + (toFov - fromFov) * t
    });
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function setPortalDiveBlur(active, durationMs) {

  blurEl.style.setProperty('--blurPx', active ? '20px' : '8px');
  blurEl.style.transition = 'opacity ' + Math.max(300, Math.round(durationMs * 0.65)) + 'ms ease-out';
  blurEl.style.opacity = active ? '0.75' : '0';
}

function playPortalDiveTransition(hs) {
  var ih = hs.ih;
  if (!ih || !ih.targetScene) return;

  portalDiveAnimToken += 1;
  var token = portalDiveAnimToken;
  var dur = Math.max(400, ih.diveDurationMs || 2800);
  var startFov = portalDiveFovRad(ih, 'start');
  var endFov = resolvePortalDiveEndFov(ih, ih.targetScene);
  var useBlur = ih.diveBlur !== false;
  var targetView = resolvePortalTargetView(ih);
  var targetYaw = targetView.yaw;
  var targetPitch = targetView.pitch;
  var targetScene = ih.targetScene;
  var sameScene = currentSceneObj && currentSceneObj.data.id === targetScene;

  if (hs.autoFadeTimer) {
    clearTimeout(hs.autoFadeTimer);
    hs.autoFadeTimer = null;
  }
  hidePortalMotion(hs.inner, hs.cover, ih);
  if (hs.portalImg) {
    hs.portalImg.style.transition = 'opacity 0.45s ease-out';
    hs.portalImg.style.opacity = '0';
  }
  hs.img.style.transition = 'opacity 0.5s ease-out';
  hs.img.style.opacity = '0';
  window[hs.flagKey] = true;

  if (useBlur) setPortalDiveBlur(true, dur);

  setTimeout(function() {
    if (token !== portalDiveAnimToken) return;

    if (sameScene) {
      if (targetYaw !== undefined && targetPitch !== undefined && currentView) {
        currentView.setParameters({
          yaw: targetYaw,
          pitch: targetPitch,
          fov: startFov
        });
      } else if (currentView) {
        currentView.setParameters({ fov: startFov });
      }
      animateViewFov(currentView, startFov, endFov, dur, token);
    } else {
      switchScene(targetScene, targetYaw, targetPitch, startFov, true);
      setTimeout(function() {
        if (token !== portalDiveAnimToken || !currentView) return;
        animateViewFov(currentView, startFov, endFov, dur, token);
      }, 100);
    }

    setTimeout(function() {
      if (token !== portalDiveAnimToken) return;
      if (useBlur) setPortalDiveBlur(false, dur);
    }, Math.round(dur * 0.35));
  }, 320);
}

function bindPortalTap(el, onTap) {
  var lastTouchEnd = 0;
  var touchMoved = false;
  var touchStartX = 0;
  var touchStartY = 0;
  el.addEventListener('touchstart', function(e) {
    touchMoved = false;
    if (e.touches && e.touches.length) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }
    e.stopPropagation();
  }, { passive: true });
  el.addEventListener('touchmove', function(e) {
    if (touchMoved || !e.touches || !e.touches.length) return;
    var dx = e.touches[0].clientX - touchStartX;
    var dy = e.touches[0].clientY - touchStartY;
    if (Math.hypot(dx, dy) > PORTAL_TAP_MOVE_TOLERANCE_PX) touchMoved = true;
  }, { passive: true });
  el.addEventListener('touchend', function(e) {
    if (touchMoved) return;
    lastTouchEnd = Date.now();
    e.preventDefault();
    e.stopPropagation();
    onTap(e);
  }, { passive: false });
  el.addEventListener('click', function(e) {
    if (Date.now() - lastTouchEnd < 600) return;
    e.preventDefault();
    e.stopPropagation();
    onTap(e);
  });
}

function onPortalHotspotTap(hs) {
  if (!portalCanTap(hs)) return;
  if (hs.portalFadeOutTimer) {
    clearTimeout(hs.portalFadeOutTimer);
    hs.portalFadeOutTimer = null;
  }
  hs.portalFadingOut = false;
  var ih = hs.ih;
  if (ih.frameSequence && resolveFrameSequenceUrls(ih.frameSequence).length && ih.playVideoOnTap !== false && !isPortalDiveTransition(ih)) {
    setPortalTappable(hs, false);
    playLinkedPortalVideo(hs);
    return;
  }
  if (ih.videoSrc && ih.playVideoOnTap !== false && !isPortalDiveTransition(ih) && isSupportedFullscreenMediaSrc(ih.videoSrc)) {
    setPortalTappable(hs, false);
    playLinkedPortalVideo(hs);
    return;
  }
  if (ih.videoSrc && ih.playVideoOnTap !== false && !isSupportedFullscreenMediaSrc(ih.videoSrc)) {
    console.warn('⚠️ videoSrc は対応形式ではないため、再生をスキップします:', ih.videoSrc);
  }
  if (ih.openInLook && ih.targetScene) {
    setPortalTappable(hs, false);
    var lookBack = location.pathname + location.search;
    var lookUrl = 'look.html?id=' + encodeURIComponent(ih.targetScene);
    if (ih.targetYaw != null && ih.targetYaw !== '') lookUrl += '&yaw=' + encodeURIComponent(ih.targetYaw);
    if (ih.targetPitch != null && ih.targetPitch !== '') lookUrl += '&pitch=' + encodeURIComponent(ih.targetPitch);
    lookUrl += '&back=' + encodeURIComponent(lookBack);
    if (ih.autoGyro) lookUrl += '&gyro=1';
    location.href = lookUrl;
    return;
  }
  if (!ih.targetScene) return;
  setPortalTappable(hs, false);
  var targetAngles = resolvePortalTargetView(ih);
  var targetId = resolveSceneId(ih.targetScene) || ih.targetScene;
  if (!scenesData[targetId]) {
    console.warn('⚠️ ポータル移動先が見つかりません:', ih.targetScene);
    return;
  }
  if (isPortalDiveTransition(ih)) {
    console.log('🌸 ポータル・ダイブ → ' + targetId);
    playPortalDiveTransition(hs);
    return;
  }
  console.log('🎎 hotspot タップ → ' + targetId + ' に移動 (pitch=' + (targetAngles.pitch != null ? radToDeg(targetAngles.pitch).toFixed(1) : '?') + '°)');
  switchScene(targetId, targetAngles.yaw, targetAngles.pitch, currentView.parameters().fov, true);
}

function isSupportedVideoSrc(src) {
  var clean = String(src || '').split('?')[0].split('#')[0].toLowerCase();
  return /\.(mp4|m4v|webm|mov|ogv|ogg)$/.test(clean);
}

function isSupportedImageSrc(src) {
  var clean = String(src || '').split('?')[0].split('#')[0].toLowerCase();
  return /\.(jpg|jpeg|png|gif|webp)$/.test(clean);
}

function isSupportedFullscreenMediaSrc(src) {
  return isSupportedVideoSrc(src) || isSupportedImageSrc(src);
}

var fullscreenVideoOnEnd = null;
var fullscreenFadeOutTimer = null;
var fullscreenFrameSeqTimer = null;
var clipPanoramaScene = null;
var clipPanoramaView = null;
var clipPanoramaGeometry = null;
var clipPanoramaScenes = [];
var clipPanoramaDestroyTimers = [];
var VIDEO_FS_FADE_IN_MS = 1150;
var VIDEO_FS_FADE_OUT_MS = 1000;

function resolveFrameSequenceUrls(seq) {
  if (!seq) return [];
  if (Array.isArray(seq.files) && seq.files.length) {
    return seq.files.filter(function(u) { return !!u; });
  }
  var folder = String(seq.folder || seq.dir || '').replace(/\\/g, '/');
  if (folder && folder.slice(-1) !== '/') folder += '/';
  var count = Number(seq.count || seq.length || 0);
  var ext = seq.ext || '.jpg';
  if (!count || count < 1) return [];

  // 0-dd001.jpg, 1-dd002.jpg …（動画切り出し＋番号並べの命名）
  if (seq.nameStyle === 'index-ddseq') {
    var startIndex = seq.startIndex != null ? Number(seq.startIndex) : 0;
    var startSeq = seq.startSeq != null ? Number(seq.startSeq) : 1;
    var seqPad = seq.seqPad != null ? Number(seq.seqPad) : 3;
    var seqPrefix = seq.seqPrefix || 'dd';
    var urls = [];
    for (var i = 0; i < count; i++) {
      var idx = startIndex + i;
      var seqNum = startSeq + i;
      var seqStr = String(seqNum);
      while (seqStr.length < seqPad) seqStr = '0' + seqStr;
      urls.push(folder + idx + '-' + seqPrefix + seqStr + ext);
    }
    return urls;
  }

  var base = seq.base || seq.prefix || '';
  if (!base && !folder) return [];
  var start = seq.start != null ? Number(seq.start) : 1;
  var pad = seq.pad != null ? Number(seq.pad) : 4;
  var urls = [];
  for (var j = 0; j < count; j++) {
    var n = start + j;
    var num = String(n);
    while (num.length < pad) num = '0' + num;
    urls.push((folder || '') + base + num + ext);
  }
  return urls;
}

function stopFullscreenFrameSequence() {
  if (fullscreenFrameSeqTimer) {
    clearTimeout(fullscreenFrameSeqTimer);
    clearInterval(fullscreenFrameSeqTimer);
    fullscreenFrameSeqTimer = null;
  }
}

function clearClipPanoramaDestroyTimers() {
  clipPanoramaDestroyTimers.forEach(function(t) { clearTimeout(t); });
  clipPanoramaDestroyTimers = [];
}

function destroyClipPanoramaScene() {
  clearClipPanoramaDestroyTimers();
  clipPanoramaScenes.forEach(function(s) {
    if (viewer) {
      try { viewer.destroyScene(s); } catch (e) {}
    }
  });
  clipPanoramaScenes = [];
  clipPanoramaScene = null;
  clipPanoramaView = null;
}

function preloadFrameUrls(urls) {
  return Promise.all(urls.map(function(url) {
    return new Promise(function(resolve, reject) {
      var im = new Image();
      im.onload = function() { resolve(im); };
      im.onerror = function() { reject(new Error(url)); };
      im.src = url;
    });
  }));
}

function showPanoramaFrameSequence(seq, opts) {
  opts = opts || {};
  var urls = resolveFrameSequenceUrls(seq);
  if (!urls.length) {
    console.warn('⚠️ frameSequence に画像がありません');
    if (opts.onEnd) opts.onEnd();
    return;
  }
  if (!viewer || !currentView) {
    console.warn('⚠️ VR表示の準備ができていないため平面再生にフォールバック');
    showFullscreenFrameSequence(seq, opts);
    return;
  }

  fadeOutBgmForVideo();
  stopFullscreenFrameSequence();
  destroyClipPanoramaScene();
  clipPanoramaGeometry = null;
  hideFullscreenVideo(false, true);

  var durationMs = Math.max(500, Number(seq.durationMs || opts.durationMs) || 5000);
  var crossfadeMs = Math.max(0, Math.min(280, Number(seq.crossfadeMs) || 110));
  var intervalMs = Math.max(crossfadeMs + 24, Math.round(durationMs / urls.length));
  var holdMs = Math.max(8, intervalMs - crossfadeMs);
  var savedParams = {
    yaw: currentView.parameters().yaw,
    pitch: currentView.parameters().pitch,
    fov: currentView.parameters().fov
  };

  if (fullscreenFadeOutTimer) {
    clearTimeout(fullscreenFadeOutTimer);
    fullscreenFadeOutTimer = null;
  }
  fullscreenVideoOnEnd = opts.onEnd || null;

  function finishSequence() {
    stopFullscreenFrameSequence();
    var cb = fullscreenVideoOnEnd;
    fullscreenVideoOnEnd = null;
    var waitMs = crossfadeMs + 80;
    clipPanoramaDestroyTimers.push(setTimeout(function() {
      destroyClipPanoramaScene();
      clipPanoramaGeometry = null;
      if (cb) cb();
    }, waitMs));
  }

  function startPlayback(equirectWidth) {
    clipPanoramaGeometry = new Marzipano.EquirectGeometry([{ width: equirectWidth }]);

    function getViewParams() {
      if (clipPanoramaView) return clipPanoramaView.parameters();
      return savedParams;
    }

    function mountClipFrame(url, isFirst) {
      var viewParams = getViewParams();
      var limiter = Marzipano.RectilinearView.limit.traditional(
        equirectWidth, 75 * Math.PI / 180, 120 * Math.PI / 180
      );
      var view = new Marzipano.RectilinearView({
        yaw: viewParams.yaw,
        pitch: viewParams.pitch,
        fov: viewParams.fov
      }, limiter);
      var source = Marzipano.ImageUrlSource.fromString(url);
      var scene = viewer.createScene({
        source: source,
        geometry: clipPanoramaGeometry,
        view: view
      });
      var outgoing = clipPanoramaScene;
      scene.switchTo({ transitionDuration: isFirst ? 0 : crossfadeMs });
      clipPanoramaScene = scene;
      clipPanoramaView = view;
      clipPanoramaScenes.push(scene);
      if (outgoing) {
        clipPanoramaDestroyTimers.push(setTimeout(function() {
          if (!viewer) return;
          try { viewer.destroyScene(outgoing); } catch (e) {}
          clipPanoramaScenes = clipPanoramaScenes.filter(function(s) { return s !== outgoing; });
        }, crossfadeMs + 70));
      }
    }

    preloadFrameUrls(urls).then(function() {
      var frameIndex = 0;

      function showNext() {
        try {
          mountClipFrame(urls[frameIndex], frameIndex === 0);
        } catch (err) {
          console.warn('⚠️ VR連番フレーム失敗:', urls[frameIndex], err);
          destroyClipPanoramaScene();
          clipPanoramaGeometry = null;
          showFullscreenFrameSequence(seq, opts);
          return;
        }
        frameIndex++;
        if (frameIndex >= urls.length) {
          fullscreenFrameSeqTimer = setTimeout(finishSequence, holdMs);
        } else {
          fullscreenFrameSeqTimer = setTimeout(showNext, holdMs + crossfadeMs);
        }
      }

      showNext();
      console.log(
        '🌐 VR連番再生: ' + urls.length + '枚 / ' + (durationMs / 1000).toFixed(1) + '秒' +
        ' (約' + Math.round(1000 / intervalMs) + 'fps, クロスフェード' + crossfadeMs + 'ms, 幅' + equirectWidth + ')'
      );
    }).catch(function(err) {
      console.warn('⚠️ 連番画像の先読みに失敗:', err);
      showFullscreenFrameSequence(seq, opts);
    });
  }

  var probe = new Image();
  probe.onload = function() {
    var w = probe.naturalWidth;
    var h = probe.naturalHeight;
    if (h > 0 && Math.abs(w / h - 2) < 0.12) {
      startPlayback(w);
    } else {
      console.warn('⚠️ 2:1パノラマではない (' + w + '×' + h + ')。平面再生にフォールバック');
      showFullscreenFrameSequence(seq, opts);
    }
  };
  probe.onerror = function() {
    console.warn('⚠️ 1枚目を読み込めません:', urls[0], '— 平面再生を試します');
    showFullscreenFrameSequence(seq, opts);
  };
  probe.src = urls[0];
}

function showFrameSequence(seq, opts) {
  opts = opts || {};
  var usePanorama = opts.preferPanorama === true || seq.vr === true || seq.display === 'panorama';
  if (seq.display === 'flat') usePanorama = false;
  if (usePanorama) showPanoramaFrameSequence(seq, opts);
  else showFullscreenFrameSequence(seq, opts);
}

function showFullscreenFrameSequence(seq, opts) {
  opts = opts || {};
  destroyClipPanoramaScene();
  var urls = resolveFrameSequenceUrls(seq);
  if (!urls.length) {
    console.warn('⚠️ frameSequence に画像がありません');
    if (opts.onEnd) opts.onEnd();
    return;
  }
  fadeOutBgmForVideo();
  var overlay = document.getElementById('videoFullscreenOverlay');
  var vid = document.getElementById('videoFullscreenPlayer');
  var img = document.getElementById('imageFullscreenPlayer');
  var startImg = document.getElementById('imageFullscreenStart');
  if (!overlay || !img) return;

  stopFullscreenFrameSequence();
  if (fullscreenFadeOutTimer) {
    clearTimeout(fullscreenFadeOutTimer);
    fullscreenFadeOutTimer = null;
  }
  fullscreenVideoOnEnd = opts.onEnd || null;

  if (vid) {
    try { vid.pause(); } catch (e) {}
    vid.removeAttribute('src');
    vid.style.display = 'none';
    vid.style.opacity = '0';
  }
  if (startImg) {
    startImg.removeAttribute('src');
    startImg.style.display = 'none';
    startImg.style.opacity = '0';
  }

  var durationMs = Math.max(500, Number(seq.durationMs || opts.durationMs) || 5000);
  var intervalMs = Math.max(20, Math.round(durationMs / urls.length));
  var frameIndex = 0;

  img.style.display = 'block';
  img.style.transition = 'none';
  img.style.transform = 'scale(1)';
  img.style.transformOrigin = 'center center';
  img.style.opacity = '1';

  function finishSequence() {
    stopFullscreenFrameSequence();
    if (opts.manualEnd && fullscreenVideoOnEnd) {
      var cb = fullscreenVideoOnEnd;
      fullscreenVideoOnEnd = null;
      cb();
    } else {
      hideFullscreenVideo(true, false);
    }
  }

  function showFrame(idx) {
    img.onerror = function() {
      console.warn('⚠️ 連番画像を読み込めません:', urls[idx]);
    };
    img.src = urls[idx];
  }

  urls.forEach(function(u) {
    var pre = new Image();
    pre.src = u;
  });

  overlay.classList.remove('is-fading-out', 'is-visible', 'is-waiting-still', 'is-image-revealed');
  overlay.classList.add('is-active');
  overlay.setAttribute('aria-hidden', 'false');
  showFrame(0);
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      overlay.classList.add('is-visible');
    });
  });

  fullscreenFrameSeqTimer = setInterval(function() {
    frameIndex++;
    if (frameIndex >= urls.length) {
      finishSequence();
      return;
    }
    showFrame(frameIndex);
  }, intervalMs);

  console.log('🎞 連番画像再生: ' + urls.length + '枚 / ' + (durationMs / 1000).toFixed(1) + '秒 (' + Math.round(1000 / intervalMs) + 'fps)');
}

function showFullscreenVideo(src, opts) {
  opts = opts || {};
  fadeOutBgmForVideo();
  var overlay = document.getElementById('videoFullscreenOverlay');
  var vid = document.getElementById('videoFullscreenPlayer');
  var img = document.getElementById('imageFullscreenPlayer');
  var startImg = document.getElementById('imageFullscreenStart');
  if (!overlay || !vid) return;
  if (!isSupportedVideoSrc(src)) {
    console.warn('⚠️ 全画面動画ではない形式のため再生しません:', src);
    if (opts.onEnd) opts.onEnd();
    return;
  }
  if (fullscreenFadeOutTimer) {
    clearTimeout(fullscreenFadeOutTimer);
    fullscreenFadeOutTimer = null;
  }
  fullscreenVideoOnEnd = opts.onEnd || null;
  if (img) {
    img.removeAttribute('src');
    img.style.display = 'none';
    img.style.opacity = '0';
    img.style.transform = 'scale(1.18)';
  }
  if (startImg) {
    startImg.removeAttribute('src');
    startImg.style.display = 'none';
    startImg.style.opacity = '0';
  }
  vid.style.display = 'block';
  vid.style.opacity = '';
  vid.loop = !!opts.loop;
  vid.src = src;
  vid.muted = false;
  vid.onerror = function() {
    console.warn('⚠️ 動画を再生できませんでした:', src);
    hideFullscreenVideo(true, true);
  };
  // manualEnd: 終了処理（角度合わせ等）を先に実行してから閉じたい場合に使う
  if (opts.manualEnd) {
    vid.onended = function() {
      if (vid.loop) return;
      if (fullscreenVideoOnEnd) fullscreenVideoOnEnd();
    };
  } else {
    vid.onended = function() {
      if (vid.loop) return;
      hideFullscreenVideo(true, false);
    };
  }
  overlay.classList.remove('is-fading-out', 'is-visible', 'is-waiting-still', 'is-image-revealed');
  overlay.classList.add('is-active');
  overlay.setAttribute('aria-hidden', 'false');
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      overlay.classList.add('is-visible');
    });
  });
  setTimeout(function() {
    vid.play().catch(function() {
      vid.muted = true;
      vid.play().catch(function() {
        console.warn('⚠️ 動画再生に失敗したためスキップします:', src);
        hideFullscreenVideo(true, true);
      });
    });
  }, Math.round(VIDEO_FS_FADE_IN_MS * 0.45));
}

function hideFullscreenVideo(callOnEnd, instant) {
  var overlay = document.getElementById('videoFullscreenOverlay');
  var vid = document.getElementById('videoFullscreenPlayer');
  var img = document.getElementById('imageFullscreenPlayer');
  var startImg = document.getElementById('imageFullscreenStart');
  if (!overlay || !vid) return;

  stopFullscreenFrameSequence();
  destroyClipPanoramaScene();

  function finishHide() {
    overlay.classList.remove('is-active', 'is-visible', 'is-fading-out', 'is-waiting-still', 'is-image-revealed');
    overlay.setAttribute('aria-hidden', 'true');
    try {
      vid.pause();
      vid.currentTime = 0;
    } catch (e) {}
    if (img) {
      img.removeAttribute('src');
      img.style.display = 'none';
      img.style.opacity = '0';
      img.style.transform = 'scale(1.18)';
    }
    if (startImg) {
      startImg.removeAttribute('src');
      startImg.style.display = 'none';
      startImg.style.opacity = '0';
    }
    restoreBgmAfterVideo();
    if (callOnEnd && fullscreenVideoOnEnd) {
      var cb = fullscreenVideoOnEnd;
      fullscreenVideoOnEnd = null;
      cb();
    }
  }

  if (!overlay.classList.contains('is-active')) {
    finishHide();
    return;
  }
  if (overlay.classList.contains('is-fading-out')) return;

  if (instant) {
    if (fullscreenFadeOutTimer) {
      clearTimeout(fullscreenFadeOutTimer);
      fullscreenFadeOutTimer = null;
    }
    finishHide();
    return;
  }

  overlay.classList.remove('is-visible');
  overlay.classList.add('is-fading-out');
  fullscreenFadeOutTimer = setTimeout(function() {
    fullscreenFadeOutTimer = null;
    finishHide();
  }, VIDEO_FS_FADE_OUT_MS);
}

var sceneFlatImageActive = false;
var sceneFlatImageSceneId = null;
var flatImageRevealAnim = null;
var flatImageLoadTimer = null;

function resolveFlatImageRevealOpts(sd) {
  var r = sd && sd.flatImageReveal;
  if (r === false || r === 'off') return null;
  var base = {
    centerX: 50,
    centerY: 50,
    startScale: 2.2,
    endScale: 1,
    durationMs: 17000,
    startDelayMs: 500,
    easing: 'ease-out'
  };
  if (!r || r === true) return base;
  return Object.assign({}, base, r);
}

function flatImageRevealEase(t, mode) {
  t = Math.max(0, Math.min(1, t));
  if (mode === 'ease-in-out') {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }
  return 1 - Math.pow(1 - t, 3);
}

function stopFlatImageReveal() {
  if (flatImageRevealAnim && flatImageRevealAnim.raf) {
    cancelAnimationFrame(flatImageRevealAnim.raf);
  }
  flatImageRevealAnim = null;
  var img = document.getElementById('sceneFlatImagePlayer');
  if (!img) return;
  img.style.transform = '';
  img.style.transformOrigin = '';
  img.classList.remove('is-revealing', 'is-revealed');
}

function runFlatImageReveal(img, opts) {
  stopFlatImageReveal();
  if (!img || !opts) return;
  var startScale = Math.max(1, Number(opts.startScale) || 2.2);
  if (startScale <= 1.001) return;
  var endScale = Number(opts.endScale) || 1;
  var duration = Math.max(500, Number(opts.durationMs) || 17000);
  var delay = Math.max(0, Number(opts.startDelayMs) || 0);
  var cx = Math.max(0, Math.min(100, Number(opts.centerX) || 50));
  var cy = Math.max(0, Math.min(100, Number(opts.centerY) || 50));
  var easing = opts.easing || 'ease-out';
  img.style.transformOrigin = cx + '% ' + cy + '%';
  img.classList.add('is-revealing');
  var state = { raf: null, t0: 0 };
  flatImageRevealAnim = state;
  function step(now) {
    if (!sceneFlatImageActive || flatImageRevealAnim !== state) return;
    if (!state.t0) state.t0 = now;
    var elapsed = now - state.t0 - delay;
    if (elapsed < 0) {
      img.style.transform = 'scale(' + startScale + ')';
      state.raf = requestAnimationFrame(step);
      return;
    }
    var t = Math.min(1, elapsed / duration);
    var eased = flatImageRevealEase(t, easing);
    var scale = startScale + (endScale - startScale) * eased;
    img.style.transform = 'scale(' + scale + ')';
    if (t < 1) {
      state.raf = requestAnimationFrame(step);
      return;
    }
    img.classList.remove('is-revealing');
    img.classList.add('is-revealed');
    img.style.transform = 'scale(' + endScale + ')';
    flatImageRevealAnim = null;
  }
  img.style.transform = 'scale(' + startScale + ')';
  state.raf = requestAnimationFrame(step);
}

function resolveSceneFlatImageSrc(sd) {
  if (!sd) return '';
  var raw = String(sd.flatImage || sd.flatImageSrc || '').trim();
  if (raw === 'auto') raw = '';
  if (!raw && (sd.flatOnly === true || sd.useFlatImage === true)) {
    return sd.id ? ('source_panos/' + sd.id + '.jpg') : '';
  }
  if (raw) return raw;
  return '';
}

function sceneUsesFlatImage(sd) {
  return !!resolveSceneFlatImageSrc(sd);
}

function ensureFlatImageSceneRegistered(sceneId) {
  if (!sceneId || scenesData[sceneId]) return scenesData[sceneId] || null;
  var scenes = (data && data.scenes) || [];
  for (var i = 0; i < scenes.length; i++) {
    var sd = scenes[i];
    if (!sd || sd.id !== sceneId || !sceneUsesFlatImage(sd)) continue;
    scenesData[sceneId] = {
      scene: null,
      view: null,
      data: Object.assign({}, sd, { direction: sd.direction }),
      isFlatImageScene: true
    };
    return scenesData[sceneId];
  }
  return null;
}

function resolveFlatImageReturnScene(sd, sceneId) {
  var explicit = String(sd.flatImageReturnScene || sd.returnScene || '').trim();
  if (explicit) {
    var eid = resolveSceneId(explicit) || explicit;
    if (scenesData[eid]) return eid;
  }
  if (window.flatImageReturnScene && scenesData[window.flatImageReturnScene]) {
    return window.flatImageReturnScene;
  }
  if (window.returnScene && scenesData[window.returnScene]) {
    return window.returnScene;
  }
  if (sd.imageHotspots && sd.imageHotspots.length) {
    for (var i = 0; i < sd.imageHotspots.length; i++) {
      var ih = sd.imageHotspots[i];
      if (!ih || !ih.targetScene) continue;
      var tid = resolveSceneId(ih.targetScene) || ih.targetScene;
      if (scenesData[tid]) return tid;
    }
  }
  var found = null;
  data.scenes.forEach(function(s) {
    if (found || !s.imageHotspots) return;
    s.imageHotspots.forEach(function(ih) {
      if (found || !ih || !ih.targetScene) return;
      var tid = resolveSceneId(ih.targetScene) || ih.targetScene;
      if (tid === sceneId) found = ih.sourceScene || ih.sceneStartId || s.id;
    });
  });
  if (found && scenesData[found]) return found;
  return null;
}

function resolveFlatImageReturnView(sd, returnId) {
  if (window.flatImageReturnScene === returnId && window.flatImageReturnYaw != null) {
    return {
      yaw: window.flatImageReturnYaw,
      pitch: window.flatImageReturnPitch != null ? window.flatImageReturnPitch : 0,
      fov: window.flatImageReturnFov
    };
  }
  if (sd.imageHotspots && sd.imageHotspots.length) {
    for (var i = 0; i < sd.imageHotspots.length; i++) {
      var ih = sd.imageHotspots[i];
      if (!ih || !ih.targetScene) continue;
      var tid = resolveSceneId(ih.targetScene) || ih.targetScene;
      if (tid === returnId) return resolvePortalTargetView(ih);
    }
  }
  var robj = scenesData[returnId];
  if (robj && robj.data && robj.data.initialViewParameters) {
    var iv = robj.data.initialViewParameters;
    return { yaw: iv.yaw, pitch: iv.pitch, fov: resolveSceneInitialFov(robj.data) };
  }
  return { yaw: undefined, pitch: undefined, fov: undefined };
}

  else s += '&v=' + encodeURIComponent(BUILD_STAMP);

}

function showSceneFlatImage(sd, sceneId, opts) {
  opts = opts || {};
  var src = resolveSceneFlatImageSrc(sd);
  if (!src) {
    console.warn('⚠️ 2D画像シーンですが flatImage がありません:', sceneId);
    return false;
  }
  if (!isSupportedImageSrc(src)) {
    console.warn('⚠️ 2D画像の形式が未対応です:', src);
    return false;
  }
  var overlay = document.getElementById('sceneFlatImageOverlay');
  var img = document.getElementById('sceneFlatImagePlayer');
  if (!overlay || !img) return false;
  sceneFlatImageActive = true;
  sceneFlatImageSceneId = sceneId;
  document.body.classList.add('scene-flat-image-active');
  overlay.classList.remove('is-visible');
  updateSceneFlatImageBackBtn(sd, sceneId);
  console.log('🖼 2D画像シーン表示:', sceneId, '→', src);

  var attempt = 0;
  var maxAttempts = 3;

  function onFlatImageReady() {
    if (!sceneFlatImageActive || sceneFlatImageSceneId !== sceneId) return;
    overlay.classList.add('is-active');
    overlay.setAttribute('aria-hidden', 'false');
    var revealOpts = resolveFlatImageRevealOpts(sd);
    if (revealOpts) runFlatImageReveal(img, revealOpts);
    else {
      img.style.transform = '';
      img.style.transformOrigin = '';
    }
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        overlay.classList.add('is-visible');
      });
    });
  }

  function onFlatImageFailed(url) {
    console.error('❌ 2D画像を読み込めません:', url);
    handleFlatImageLoadFailure(sceneId);
  }

  function clearFlatImageLoadTimer() {
    if (flatImageLoadTimer) {
      clearTimeout(flatImageLoadTimer);
      flatImageLoadTimer = null;
    }
  }

  function tryLoadFlatImage() {
    if (!sceneFlatImageActive || sceneFlatImageSceneId !== sceneId) return;
    attempt += 1;
    var url = flatImageMediaUrl(src);
    if (attempt > 1) {
      url += (url.indexOf('?') < 0 ? '?' : '&') + 'retry=' + attempt + '&_=' + Date.now();
    }
    clearFlatImageLoadTimer();
    flatImageLoadTimer = setTimeout(function() {
      flatImageLoadTimer = null;
      console.warn('⚠️ 2D画像の読込が遅いため再試行します:', sceneId, 'attempt', attempt);
      if (attempt < maxAttempts) tryLoadFlatImage();
      else onFlatImageFailed(url);
    }, attempt === 1 ? 25000 : 18000);
    img.onload = function() {
      clearFlatImageLoadTimer();
      onFlatImageReady();
    };
    img.onerror = function() {
      clearFlatImageLoadTimer();
      console.warn('⚠️ 2D画像読込失敗 attempt', attempt, url);
      if (attempt < maxAttempts) {
        setTimeout(tryLoadFlatImage, 500);
        return;
      }
      onFlatImageFailed(url);
    };
    img.alt = sd.name || sceneId || '';
    img.src = url;
  }

  tryLoadFlatImage();
  return true;
}

function showFullscreenImage(src, opts) {

  var img = document.getElementById('imageFullscreenPlayer');

  }

    clearTimeout(fullscreenFadeOutTimer);
    fullscreenFadeOutTimer = null;
  }
  fullscreenVideoOnEnd = opts.onEnd || null;
  if (vid) {
    try { vid.pause(); } catch (e) {}
    vid.removeAttribute('src');
    vid.style.display = 'none';
    vid.style.opacity = '0';
  }
  var hasStartImage = !!(opts.startSrc && isSupportedImageSrc(opts.startSrc) && opts.startSrc !== src && startImg);
  var zoomStartScale = Math.max(1.05, Number(opts.zoomStartScale) || 2.7);
  var zoomOrigin = opts.zoomOrigin || '32% 45%';
  img.style.display = 'block';
  img.removeAttribute('src');

  img.style.transform = 'scale(' + zoomStartScale + ')';

    startImg.removeAttribute('src');

    img.style.transitionDuration = '1.05s, ' + Math.max(3600, opts.durationMs || 6800) + 'ms';

      requestAnimationFrame(function() {
        overlay.classList.add('is-visible');
        img.style.transform = 'scale(1)';
      });
    });
    var startHold = hasStartImage ? Math.max(450, opts.startHoldMs || 950) : 0;
    if (hasStartImage) {
      setTimeout(function() {
        overlay.classList.add('is-image-revealed');
      }, startHold);
    }
    var endHold = Math.max(0, Number(opts.endHoldMs) || 500);
    var hold = Math.max(2200, opts.durationMs || 6800) + startHold + endHold;
    fullscreenFadeOutTimer = setTimeout(function() {
      fullscreenFadeOutTimer = null;
      if (opts.manualEnd) {
        if (fullscreenVideoOnEnd) fullscreenVideoOnEnd();
      } else {
        hideFullscreenVideo(true, false);
      }
    }, hold);
  };
  img.onerror = function() {
    console.warn('⚠️ 静止画を表示できませんでした:', src);
    hideFullscreenVideo(true, true);
  };

function playLinkedPortalVideo(hs) {
  var ih = hs.ih;
  if (!hs.inner || hs.videoPlaying) return;
  hs.videoPlaying = true;
  if (hs.autoFadeTimer) {
    clearTimeout(hs.autoFadeTimer);
    hs.autoFadeTimer = null;
  }
  console.log('🎬 ポータル全画面メディア再生: ' + (ih.frameSequence ? ('連番' + resolveFrameSequenceUrls(ih.frameSequence).length + '枚') : ih.videoSrc));
  fadeOutBgmForVideo();

  if (hs.portalImg) {
    hs.portalImg.style.transition = 'opacity 0.85s ease-in-out';
    hs.portalImg.style.opacity = '0';
  }
  if (hs.cover) {
    hs.cover.style.transition = 'opacity 0.75s ease-in-out';
    hs.cover.style.opacity = '0';
  }

  function finishPortalVideo() {
    if (!hs.videoPlaying) return;
    hs.videoPlaying = false;
    window[hs.flagKey] = true;
    if (hs.linkedVideo) {
      hs.linkedVideo.classList.remove('is-playing');
      try {
        hs.linkedVideo.pause();
        hs.linkedVideo.currentTime = 0;
      } catch (e) {}
    }
    hidePortalMotion(hs.inner, hs.cover, ih);
    if (hs.portalImg) hs.portalImg.style.opacity = '0';
    hs.img.style.transition = 'opacity 1.1s ease-in-out';
    hs.img.style.opacity = '0';
    setPortalTappable(hs, false);

    if (ih.targetSceneAfterVideo) {
      var afterVideoView = resolvePortalTargetView({
        targetYaw: ih.targetYawAfterVideo,
        targetPitch: ih.targetPitchAfterVideo
      });
      setTimeout(function() {
        switchScene(
          ih.targetSceneAfterVideo,
          afterVideoView.yaw,
          afterVideoView.pitch,
          currentView.parameters().fov,
          true
        );
      }, 500);
      // 画面遷移の後にフェードで閉じる（yawの一瞬見えを防止）
      setTimeout(function() { hideFullscreenVideo(false, false); }, 750);
      return;
    }

    // 既定動作: targetSceneAfterVideo が無い場合は targetScene/targetYaw/targetPitch を使う。
    // （動画を見終わったら指定した向きへ“戻す/移動する”）
    if (ih.targetScene) {
      var sameScene = currentSceneObj && currentSceneObj.data && currentSceneObj.data.id === ih.targetScene;
      // 先に pano の向きを合わせてから overlay を閉じる（77°が見えるのを防ぐ）
      var endPortalView = resolvePortalTargetView(ih);
      if (sameScene) {
        if (currentView && endPortalView.yaw !== undefined && endPortalView.pitch !== undefined) {
          currentView.setParameters({
            yaw: endPortalView.yaw,
            pitch: endPortalView.pitch,
            fov: currentView.parameters().fov
          });
          requestAnimationFrame(function() {
            if (!currentView) return;
            currentView.setParameters({
              yaw: endPortalView.yaw,
              pitch: endPortalView.pitch,
              fov: currentView.parameters().fov
            });
            // 次フレームで閉じる（確実に向きが反映された後にフェード開始）
            requestAnimationFrame(function() { hideFullscreenVideo(false, false); });
          });
        }
        return;
      }
      // 別シーンへ移動する場合も、overlay を残したまま switch してから閉じる
      switchScene(
        ih.targetScene,
        endPortalView.yaw,
        endPortalView.pitch,
        currentView.parameters().fov,
        true
      );
      setTimeout(function() { hideFullscreenVideo(false, false); }, 720);
      return;
    }

    // 遷移先指定が無い場合はそのまま閉じる
    hideFullscreenVideo(false, false);
  }

  var useFullscreen = ih.videoFullscreen !== false;
  if (useFullscreen) {
    setTimeout(function() {
      if (ih.frameSequence && resolveFrameSequenceUrls(ih.frameSequence).length) {
        showFrameSequence(ih.frameSequence, {
          manualEnd: true,
          onEnd: finishPortalVideo,
          preferPanorama: ih.frameSequence.vr !== false
        });
      } else if (isSupportedImageSrc(ih.videoSrc)) {
        showFullscreenImage(ih.videoSrc, {
          zoomStartScale: ih.stillZoomStartScale || ih.videoStillZoomStartScale || 2.7,
          zoomOrigin: ih.stillZoomOrigin || ih.videoStillZoomOrigin || '32% 45%',
          durationMs: ih.stillDurationMs || ih.videoImageDurationMs || ih.videoStillDurationMs || 6800,
          endHoldMs: ih.stillEndHoldMs || ih.videoStillEndHoldMs || 500,
          manualEnd: true,
          onEnd: finishPortalVideo
        });
      } else {
        showFullscreenVideo(ih.videoSrc, {
          loop: ih.videoLoop === true,
          manualEnd: true,
          onEnd: function() {
            // 動画終了 → 先に pano の向き/遷移を確定 → その後に overlay を閉じる
            finishPortalVideo();
          }
        });
      }
    }, 520);
    return;
  }

  var vid = hs.linkedVideo;
  if (!vid) {
    vid = document.createElement('video');
    vid.className = 'portal-linked-video';
    vid.src = ih.videoSrc;
    vid.playsInline = true;
    vid.muted = false;
    vid.loop = ih.videoLoop === true;
    vid.preload = 'auto';
    hs.inner.appendChild(vid);
    hs.linkedVideo = vid;
  }
  setTimeout(function() {
    if (!hs.linkedVideo) return;
    hs.linkedVideo.classList.add('is-playing');
    hs.linkedVideo.play().catch(function() {
      hs.linkedVideo.muted = true;
      hs.linkedVideo.play();
    });
  }, 400);
  vid.onended = function() {
    if (ih.videoLoop === true) return;
    finishPortalVideo();
  };
}

function guideCoordsToScreenApprox(yaw, pitch) {
  var view = currentScene && currentScene.view && currentScene.view();
  if (!view) return null;
  try {
    if (typeof view.coordinatesToScreen === 'function') {
      var scr = view.coordinatesToScreen({ yaw: yaw, pitch: pitch });
      if (scr && isFinite(scr.x) && isFinite(scr.y)) return scr;
    }
  } catch (e0) {}
  var p = view.parameters();
  if (!p) return null;
  var dy = yaw - p.yaw;
  while (dy > Math.PI) dy -= 2 * Math.PI;
  while (dy < -Math.PI) dy += 2 * Math.PI;
  var dp = pitch - p.pitch;
  var fov = p.fov || 1.2;
  if (Math.abs(dy) > fov * 0.62 || Math.abs(dp) > fov * 0.55) return null;
  var panoW = panoElement.clientWidth || window.innerWidth;
  var panoH = panoElement.clientHeight || window.innerHeight;
  return {
    x: panoW * (0.5 + dy / fov),
    y: panoH * (0.5 + dp / fov)
  };
}

function updateAllGuideIosOverlays() {
  if (!guideDeviceIsIosSafari()) return;
  var curId = currentSceneObj && currentSceneObj.data ? currentSceneObj.data.id : null;
  var panoRect = panoElement.getBoundingClientRect();
  (window.sceneVideoEls || []).forEach(function(entry) {
    if (!entry.iosScreenOverlay || !entry.iosOverlayEl) return;
    if (!curId || entry.sceneId !== curId) {
      entry.iosOverlayEl.style.display = 'none';
      return;
    }
    var pitchOff = entry.iosPitchOffset != null ? entry.iosPitchOffset : 0;
    var scr = guideCoordsToScreenApprox(entry.placeYaw, entry.placePitch + pitchOff);
    var el = entry.iosOverlayEl;
    var panoW = panoRect.width || panoElement.clientWidth || window.innerWidth;
    var panoH = panoRect.height || panoElement.clientHeight || window.innerHeight;
    if (!scr) {
      scr = { x: panoW * 0.58, y: panoH * 0.28 };
    }
    var w = entry.overlayW || 280;
    var h = entry.overlayH || 380;
    var pct = entry.iosMaxWidthPct != null ? entry.iosMaxWidthPct : 0.72;
    var maxW = Math.min(w, Math.round(panoW * pct));
    var scale = maxW / w;
    var drawW = Math.round(w * scale);
    var drawH = Math.round(h * scale);
    var anchorY = entry.iosAnchorY != null ? entry.iosAnchorY : 0.52;
    var offY = entry.iosOverlayOffsetY != null ? entry.iosOverlayOffsetY : 0;
    var top = panoRect.top + scr.y - drawH * anchorY + offY;
    var minTop = panoRect.top + 6;
    var maxTop = panoRect.top + panoH - drawH - 6;
    if (top < minTop) top = minTop;
    if (top > maxTop) top = maxTop;
    el.style.display = 'block';
    el.style.left = (panoRect.left + scr.x - drawW * 0.5) + 'px';
    el.style.top = top + 'px';
    el.style.width = drawW + 'px';
    el.style.height = drawH + 'px';
    entry.overlayDrawW = drawW;
    entry.overlayDrawH = drawH;
  });
}

function rebindGuideIosViewListener() {

function lockPortalArrivalView(sceneObj, viewParams, holdMs) {
  if (!sceneObj || !sceneObj.view || !viewParams || embedPlacerMode) return;
  var view = sceneObj.view;
  var sceneId = sceneObj.data.id;
  var endAt = Date.now() + holdMs;
