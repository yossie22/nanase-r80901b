      var h = parseInt(entry.wrap.style.height, 10) || 380;
      canvas.width = w;
      canvas.height = h;
      drawGuideCanvasBlackKey(entry.guideCanvasCtx, img, w, h, entry.blackKeyThr, entry.blackKeySoft, entry.hotspotDrawOpts);
      applyVideoHotspotTone(canvas, vh.tone);
    }
    img.addEventListener('load', paintStill);
    if (img.complete) paintStill();
    return;
  }
  maskWrap.classList.add('guide-img-matte');
  applyVideoHotspotObjectFit(img, vh);
  applyVideoHotspotTone(img, vh.tone);
}

function cleanupGuideStillFadeTimers(entry) {
  if (!entry) return;
  if (entry.guideStillFadeTimer) {
    clearTimeout(entry.guideStillFadeTimer);
    entry.guideStillFadeTimer = null;
  }
}

function setupGuideStillImageFadeSchedule(wrap, entry, vh) {
  if (!wrap || !entry || !vh) return;
  if (embedPlacerMode) {
    cleanupGuideStillFadeTimers(entry);
    entry.guideStillHidden = false;
    entry.guidePlaybackDone = true;
    wrap.style.opacity = '1';
    wrap.style.transition = '';
    return;
  }
  cleanupGuideStillFadeTimers(entry);
  var fadeInMs = vh.fadeInMs != null ? parseInt(vh.fadeInMs, 10) : 0;
  var fadeOutMs = guideFadeOutMs(vh);
  var dur = guidePlayDurationMs(vh);
  if (!fadeInMs && !fadeOutMs && !dur) {
    entry.guidePlaybackDone = true;
    return;
  }
  function hideStill() {
    if (!entry || entry.guideStillHidden || !wrap.parentNode) return;
    entry.guideStillHidden = true;
    entry.guidePlaybackDone = true;
    runVideoHotspotFadeOut(wrap, fadeOutMs);
  }
  function scheduleHide() {
    if (!dur || dur < 250) return;
    entry.guideStillFadeTimer = setTimeout(hideStill, dur);
  }
  if (fadeInMs > 0) {
    runVideoHotspotFadeIn(wrap, fadeInMs);
    setTimeout(scheduleHide, fadeInMs + 40);
  } else {
    scheduleHide();
  }
}

function syncHotspotDrawOpts(entry, vh) {
  if (!entry) return;
  entry.hotspotDrawOpts = {
    objectFit: vh && vh.objectFit === 'cover' ? 'cover' : 'contain',
    objectPositionY: videoHotspotObjectPositionY(vh)
  };
}

function hotspotDefringe(vh) {
  if (!vh) return 40;
  if (vh.defringe != null) return parseInt(vh.defringe, 10);
  if (vh.edgeSoft != null) return parseInt(vh.edgeSoft, 10);
  return 40;
}

function updateVideoHotspotLive(vh) {
  var entry = window.sceneVideoEls && window.sceneVideoEls[0];
  var hs = window.sceneVideoHotspotHandles && window.sceneVideoHotspotHandles[0];
  if (!entry || !hs || !entry.wrap) return false;
  var w = parseInt(vh.width, 10) || 280;
  var h = parseInt(vh.height, 10) || 380;
  w = Math.max(200, w);
  h = Math.max(260, h);
  entry.wrap.style.width = w + 'px';
  entry.wrap.style.height = h + 'px';
  var placeYaw = vh.yaw !== undefined ? degToRad(parseFloat(vh.yaw)) : 0;
  var placePitch = vh.pitch !== undefined ? degToRad(parseFloat(vh.pitch)) : 0;
  var radius = videoHotspotPerspectiveRadius(vh, w, h);
  try {
    hs.setPosition({ yaw: placeYaw, pitch: placePitch });
    hs.setPerspective({ radius: radius });
  } catch (e) {
    return false;
  }
  syncHotspotDrawOpts(entry, vh);
  if (entry.isStillImage && entry.stillImg) {
    if (vh.src) {
      var wantBase = guideVideoFileBaseName(vh.src);
      var curBase = guideVideoFileBaseName(entry.guideVideoSrc || entry.stillImg.src);
      if (vh._imgBust || (wantBase && wantBase !== curBase)) {
        forceReloadStillImageEntry(entry, vh);
      }
    }
    applyVideoHotspotObjectFit(entry.stillImg, vh);
    applyVideoHotspotTone(entry.stillImg, vh.tone);
    if (entry.guideCanvasCtx) {
      var thr = entry.blackKeyThr;
      var cw = parseInt(entry.wrap.style.width, 10) || 280;
      var ch = parseInt(entry.wrap.style.height, 10) || 380;
      entry.guideCanvas.width = cw;
      entry.guideCanvas.height = ch;
      drawGuideCanvasBlackKey(entry.guideCanvasCtx, entry.stillImg, cw, ch, thr, entry.blackKeySoft, entry.hotspotDrawOpts);
      applyVideoHotspotTone(entry.guideCanvas, vh.tone);
    }
  } else if (entry.vid) {
    if (vh.src) {
      var wantBase = guideVideoFileBaseName(vh.src);
      var curBase = guideVideoFileBaseName(entry.guideVideoSrc || entry.vid.currentSrc || entry.vid.src);
      if (wantBase && wantBase !== curBase) {
        appendGuideVideoSources(entry.vid, vh);
        entry.guideVideoSrc = vh.src;
        entry.vid.load();
        ensureGuideVideoPlays(entry);
      }
    }
    applyVideoHotspotObjectFit(entry.vid, vh);
    applyVideoHotspotTone(entry.vid, vh.tone);
    if (entry.guideCanvas) applyVideoHotspotTone(entry.guideCanvas, vh.tone);
  }
  entry.guidePlaceYaw = placeYaw;
  entry.guidePlacePitch = placePitch;
  entry.guideRadius = radius;
  entry.guideW = w;
  entry.guideH = h;
  applyGuideFeetFade(entry, vh);
  applyGuideGroundShadow(entry, vh);
  if (entry.guideCanvasCtx && entry.guideVideoSrc !== vh.src) {
    paintGuideCanvasOnce(entry, entry.blackKeyThr);
  }
  return true;
}

function mergeGuideHotspotPreview(preview, sceneId) {
  if (!preview) return preview;
  var saved = savedVideoHotspotsForScene(sceneId);
  var base = saved && saved[0] ? saved[0] : null;
  if (!base) return preview;
  var merged = Object.assign({}, base, preview);
  if (preview.canvasBlackKey !== true) {
    delete merged.canvasBlackKey;
    delete merged.blackKeyThreshold;
    delete merged.blackKeySoft;
  }
  if (preview.guideRestFrame == null && base.guideRestFrame != null) {
    merged.guideRestFrame = base.guideRestFrame;
  }
  return merged;
}

function getVideoHotspotsForScene(sceneId, sceneData) {
  if (embedShadowMode && shadowPreviewHotspot && shadowPreviewSceneId === sceneId) {
    return [shadowPreviewHotspot];
  }
  // 貼り付けプレビューは編集中シーンだけ。他の cc シーンでは出さない
  if (embedPlacerMode && placerPreviewHotspot && placerPreviewSceneId === sceneId) {
    return [mergeGuideHotspotPreview(placerPreviewHotspot, sceneId)];
  }
  if (window.APP_DATA && window.APP_DATA.scenes) {
    for (var i = 0; i < window.APP_DATA.scenes.length; i++) {
      var s = window.APP_DATA.scenes[i];
      if (s.id === sceneId && s.videoHotspots && s.videoHotspots.length) {
        return s.videoHotspots;
      }
    }
  }
  return sceneData && sceneData.videoHotspots ? sceneData.videoHotspots : [];
}

function updateIosScreenOverlayFromHotspot(entry, vh) {
  if (!entry || !entry.iosScreenOverlay || !vh) return;
  entry.placeYaw = vh.yaw !== undefined ? degToRad(parseFloat(vh.yaw)) : entry.placeYaw;
  entry.placePitch = vh.pitch !== undefined ? degToRad(parseFloat(vh.pitch)) : entry.placePitch;
  entry.overlayW = Math.max(200, parseInt(vh.width, 10) || entry.overlayW || 280);
  entry.overlayH = Math.max(260, parseInt(vh.height, 10) || entry.overlayH || 380);
  if (entry.wrap) {
    entry.wrap.style.width = entry.overlayW + 'px';
    entry.wrap.style.height = entry.overlayH + 'px';
  }
  syncHotspotDrawOpts(entry, vh);
  if (entry.vid && entry.maskWrap) {
    applyVideoHotspotObjectFit(entry.vid, vh);
    if (entry.guideCanvas) applyVideoHotspotTone(entry.guideCanvas, vh.tone);
  }
  applyGuideFeetFade(entry, vh);
  applyGuideBlackKeyToEntry(entry, vh);
  updateAllGuideIosOverlays();
  paintGuideCanvasOnce(entry, entry.blackKeyThr);
}

function tryApplyPlacerPreviewHotspot() {
  if (!embedPlacerMode) return;
  if (!currentSceneObj || !currentScene) return;
  var hotspot = placerPreviewPending || placerPreviewHotspot;
  if (!hotspot) return;
  placerPreviewHotspot = hotspot;
  placerPreviewPending = null;
  var key = placerPreviewHotspotKey(hotspot);
  var iosEntry = null;
  (window.sceneVideoEls || []).some(function(e) {
    if (e && e.iosScreenOverlay) { iosEntry = e; return true; }
    return false;
  });
  if (iosEntry) {
    placerPreviewLastKey = key;
    updateIosScreenOverlayFromHotspot(iosEntry, hotspot);
    return;
  }
  if (window.sceneVideoHotspotHandles && window.sceneVideoHotspotHandles.length) {
    placerPreviewLastKey = key;
    updateVideoHotspotLive(hotspot);
    return;
  }
  if (key === placerPreviewLastKey &&
      window.sceneVideoHotspotHandles && window.sceneVideoHotspotHandles.length) {
    return;
  }
  placerPreviewLastKey = key;
  if (updateVideoHotspotLive(hotspot)) return;
  destroySceneVideoHotspots();
  attachVideoHotspots(currentSceneObj.data.id, currentSceneObj.data);
}

function savedVideoHotspotsForScene(sceneId) {
  if (window.APP_DATA && window.APP_DATA.scenes) {
    for (var i = 0; i < window.APP_DATA.scenes.length; i++) {
      var s = window.APP_DATA.scenes[i];
      if (s.id === sceneId && s.videoHotspots && s.videoHotspots.length) {
        return s.videoHotspots;
      }
    }
  }
  return [];
}

function schedulePlacerLiveAttach(hotspot, sceneId) {
  if (!embedPlacerMode || !currentSceneObj || !hotspot) return;
  if (currentSceneObj.data.id !== sceneId) return;
  if (placerLiveAttachTimer) clearTimeout(placerLiveAttachTimer);
  placerLiveAttachTimer = setTimeout(function() {
    placerLiveAttachTimer = null;
    placerPreviewSceneId = sceneId;
    placerPreviewHotspot = hotspot;
    placerPreviewPending = null;
    placerPreviewLastKey = placerPreviewHotspotKey(hotspot);
    destroySceneVideoHotspots();
    attachVideoHotspots(currentSceneObj.data.id, currentSceneObj.data);
  }, 50);
}

function applyPlacerPreviewHotspot(hotspot, sceneId, fromParent) {
  if (!embedPlacerMode) return;
  var newSceneId = sceneId || placerPreviewSceneId || (currentSceneObj ? currentSceneObj.data.id : '25-cc003');
  if (currentSceneObj && newSceneId !== currentSceneObj.data.id) {
    return;
  }
  if (newSceneId !== placerPreviewSceneId) {
    placerPreviewLastKey = '';
  }
  placerPreviewSceneId = newSceneId;
  if (!hotspot) {
    placerPreviewHotspot = null;
    destroySceneVideoHotspots();
    return;
  }
  if (hotspot._imgBust) placerImageCacheBust = String(hotspot._imgBust);
  hotspot = mergeGuideHotspotPreview(hotspot, newSceneId);
  if (fromParent) {
    schedulePlacerLiveAttach(hotspot, newSceneId);
    return;
  }
  placerPreviewPending = hotspot;
  tryApplyPlacerPreviewHotspot();
}

function fetchPlacerPreviewFromServer() {
  if (!embedPlacerMode || !currentSceneObj) return;
  var sid = currentSceneObj.data.id;
  fetch('/api/preview-hotspot?scene=' + encodeURIComponent(sid), { cache: 'no-store' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!currentSceneObj) return;
      if (currentSceneObj.data.id !== sid) return;
      var hotspot = (data.ok && data.hotspot) ? data.hotspot : null;
      if (!hotspot) {
        /* 表示中に data.js へ戻すとスライダー変更が消える */
        if (window.sceneVideoHotspotHandles && window.sceneVideoHotspotHandles.length) {
          return;
        }
        var saved = savedVideoHotspotsForScene(sid);
        hotspot = saved.length ? saved[0] : null;
      }
      if (!hotspot) {
        if (!(window.sceneVideoHotspotHandles && window.sceneVideoHotspotHandles.length)) {
          destroySceneVideoHotspots();
        }
        return;
      }
      placerPreviewSceneId = sid;
      var key = placerPreviewHotspotKey(hotspot);
      if (key === placerPreviewLastKey && window.sceneVideoHotspotHandles && window.sceneVideoHotspotHandles.length) {
        return;
      }
      placerPreviewHotspot = hotspot;
      placerPreviewPending = hotspot;
      tryApplyPlacerPreviewHotspot();
    })
    .catch(function() {});
}

function startPlacerPreviewPolling() {
  if (!embedPlacerMode) return;
  notifyPlacerParentReady();
  /* 貼り付けツールの iframe 内は親が postMessage するためポーリングしない（data.js へ戻して消えるのを防ぐ） */
  if (window.parent && window.parent !== window) {
    return;
  }
  if (placerPreviewPollTimer) clearInterval(placerPreviewPollTimer);
  placerPreviewPollTimer = setInterval(fetchPlacerPreviewFromServer, 2000);
}

if (embedPlacerMode) {
  startPlacerPreviewPolling();
  window.addEventListener('message', function(ev) {
    var d = ev.data;
    if (!d) return;
    if (d.type === 'placerPreviewHotspot') {
      applyPlacerPreviewHotspot(d.hotspot, d.sceneId, true);
      return;
    }
    if (d.type === 'placerLookAtGuide' && currentScene && currentScene.view()) {
      var params = currentScene.view().parameters();
      params.yaw = degToRad(parseFloat(d.yaw) || 0);
      if (d.pitch != null && isFinite(d.pitch)) params.pitch = degToRad(parseFloat(d.pitch));
      currentScene.view().setParameters(params);
    }
  });
}

function shadowPreviewHotspotKey(h) {
  if (!h) return '';
  return JSON.stringify({
    footShadow: h.footShadow,
    footShadowImage: h.footShadowImage || '',
    footShadowConfig: h.footShadowConfig || null
  });
}

function notifyShadowParentReady() {
  if (!embedShadowMode || !window.parent || window.parent === window) return;
  try {
    window.parent.postMessage({
      type: 'shadowViewerReady',
      sceneId: currentSceneObj ? currentSceneObj.data.id : null
    }, '*');
  } catch (e) {}
  bindShadowEmbedOverlayTracking();
  scheduleShadowPaintLayoutPost();
}

function applyShadowPreviewHotspot(hotspot, sceneId) {
  if (!embedShadowMode || !hotspot) return;
  var sid = sceneId || shadowPreviewSceneId || (currentSceneObj ? currentSceneObj.data.id : null);
  if (!sid) return;
  shadowPreviewSceneId = sid;
  shadowPreviewHotspot = hotspot;
  shadowPreviewLastKey = shadowPreviewHotspotKey(hotspot);
  if (currentSceneObj && currentSceneObj.data.id === sid) {
    var entry = window.sceneVideoEls && window.sceneVideoEls[0];
    if (entry && entry.wrap) {
      entry.vh = hotspot;
      applyGuideFeetFade(entry, hotspot);
      applyGuideGroundShadow(entry, hotspot);
      scheduleShadowPaintLayoutPost();
      return;
    }
    attachVideoHotspots(sid, currentSceneObj.data);
    return;
  }
  switchScene(
    sid,
    hotspot.yaw != null ? degToRad(parseFloat(hotspot.yaw)) : undefined,
    hotspot.pitch != null ? degToRad(parseFloat(hotspot.pitch)) : undefined
  );
}

if (embedShadowMode) {
  window.addEventListener('message', function(ev) {
    var d = ev.data;
    if (!d) return;
    if (d.type === 'shadowPreview') {
      applyShadowPreviewHotspot(d.hotspot, d.sceneId);
      return;
    }
    if (d.type === 'shadowPaintRequestLayout') {
      postShadowPaintLayoutToParent();
      return;
    }
    if (d.type === 'shadowLookAtGuide' && currentScene && currentScene.view()) {
      var params = currentScene.view().parameters();
      params.yaw = degToRad(parseFloat(d.yaw) || 0);
      if (d.pitch != null && isFinite(d.pitch)) params.pitch = degToRad(parseFloat(d.pitch));
      currentScene.view().setParameters(params);
      scheduleShadowPaintLayoutPost();
    }
  });
}

function attachVideoHotspots(sceneId, sceneData) {
  var list = getVideoHotspotsForScene(sceneId, sceneData);
  if (!list || !list.length || !currentScene) return;
  if (!currentSceneObj || currentSceneObj.data.id !== sceneId) return;
  // 配列だけ消すと Marzipano 上に動画が二重に残る（透明＋重なりの原因）
  destroySceneVideoHotspots();
  window.sceneVideoEls = [];
  window.sceneVideoHotspotHandles = [];
  list.forEach(function(vh) {
    if (!vh.src) return;
    var w = parseInt(vh.width, 10) || 280;
    var h = parseInt(vh.height, 10) || 380;
    if (w < 200 || h < 260) {
      console.warn('🎬 ガイドが小さすぎるため拡大: ' + w + 'x' + h + ' → 280x380（data.js を直すか貼り付けツールで保存）');
      w = Math.max(w, 280);
      h = Math.max(h, 380);
    }
    var wrap = document.createElement('div');
    wrap.className = 'scene-video-2d-wrap';
    wrap.style.width = w + 'px';
    wrap.style.height = h + 'px';
    wrap.style.maxWidth = 'none';
    wrap.style.maxHeight = 'none';

    var maskWrap = document.createElement('div');
    maskWrap.className = 'scene-video-mask';
    var placeYaw = vh.yaw !== undefined ? degToRad(parseFloat(vh.yaw)) : 0;
    var placePitch = vh.pitch !== undefined ? degToRad(parseFloat(vh.pitch)) : 0;
    var radius = videoHotspotPerspectiveRadius(vh, w, h);

    if (videoHotspotIsStillImage(vh)) {
      var stillImg = document.createElement('img');
      stillImg.className = 'guide-video-frame scene-video-still';
      stillImg.alt = '';
      stillImg.src = videoHotspotSrcUrl(vh.src);
      maskWrap.appendChild(stillImg);
      wrap.appendChild(maskWrap);
      var stillEntry = {
        stillImg: stillImg,
        vid: null,
        wrap: wrap,
        maskWrap: maskWrap,
        sceneId: sceneId,
        vh: vh,
        guidePlaybackDone: false,
        guideVideoSrc: vh.src || '',
        isStillImage: true
      };
      syncHotspotDrawOpts(stillEntry, vh);
      setupGuideStillImage(stillImg, maskWrap, vh, stillEntry);
      applyGuideFeetFade(stillEntry, vh);
      wrap.style.pointerEvents = 'none';
      stillEntry.guidePlaceYaw = placeYaw;
      stillEntry.guidePlacePitch = placePitch;
      stillEntry.guideRadius = radius;
      stillEntry.guideW = w;
      stillEntry.guideH = h;
      var stillHs = currentScene.hotspotContainer().createHotspot(wrap,
        { yaw: placeYaw, pitch: placePitch },
        { perspective: { radius: radius } }
      );
      window.sceneVideoHotspotHandles.push(stillHs);
      window.sceneVideoEls.push(stillEntry);
      if (guideFootShadowEnabled(vh)) {
        applyGuideGroundShadow(stillEntry, vh);
      }
      console.log('🖼 静止画ガイド配置: ' + sceneId +
        ' yaw=' + vh.yaw + '° pitch=' + vh.pitch + '° size=' + w + 'x' + h + ' src=' + vh.src);
      stillImg.addEventListener('error', function() {
        console.error('🖼 画像読込失敗: ' + vh.src);
      }, { once: true });
      setupGuideStillImageFadeSchedule(wrap, stillEntry, vh);
      return;
    }

    var vid = document.createElement('video');
    vid.className = 'scene-video-2d';
    appendGuideVideoSources(vid, vh);
    vid.loop = vh.loop === true;
    vid.playsInline = true;
    vid.setAttribute('playsinline', '');
    vid.muted = true;
    vid.preload = 'auto';
    if (vh.poster) vid.poster = vh.poster;
    if (vh.autoplay) {
      vid.autoplay = true;
      vid.muted = true;
    }
    maskWrap.appendChild(vid);
    wrap.appendChild(maskWrap);
    var entry = { vid: vid, wrap: wrap, maskWrap: maskWrap, sceneId: sceneId, vh: vh, guidePlaybackDone: false, guideVideoSrc: vh.src || '' };
    syncHotspotDrawOpts(entry, vh);
    applyGuideVideoMatte(vid, maskWrap, vh, entry);
    applyGuideFeetFade(entry, vh);
    if (vh.loop !== true) {
      wrap.style.pointerEvents = 'none';
    }

    bindVideo2DTap(wrap, vid, vh);
    if (guideDeviceIsIosSafari() && guideIosUseScreenOverlay(vh)) {
      attachGuideIosScreenOverlay(sceneId, vh, w, h, placeYaw, placePitch);
      console.log('🎬 iPad: 画面固定オーバーレイ（iosScreenOverlay または ?iosOverlay=1）');
      return;
    }
    if (guideDeviceIsIosSafari()) {
      console.log(vh.srcHevc
        ? '🎬 iPad: パノラマホットスポット（透過ipad・ピタ追従）'
        : '🎬 iPad: パノラマホットスポット');
    }
    if (Math.abs(parseFloat(vh.pitch)) > 45) {
      console.warn('🎬 pitch=' + vh.pitch + '° は大きすぎて見えないことが多いです。8〜15 前後を推奨');
    }
    entry.guidePlaceYaw = placeYaw;
    entry.guidePlacePitch = placePitch;
    entry.guideRadius = radius;
    entry.guideW = w;
    entry.guideH = h;
    var hs = currentScene.hotspotContainer().createHotspot(wrap,
      { yaw: placeYaw, pitch: placePitch },
      { perspective: { radius: radius } }
    );
    window.sceneVideoHotspotHandles.push(hs);
    window.sceneVideoEls.push(entry);
    if (guideFootShadowEnabled(vh)) {
      applyGuideGroundShadow(entry, vh);
    }
    console.log('🎬 ガイド配置: ' + sceneId +
      ' yaw=' + vh.yaw + '° pitch=' + vh.pitch + '° size=' + w + 'x' + h + ' radius=' + radius +
      ' （1回再生・終了後は静止画）');
    setupGuideVideoPlayback(vid, vh, sceneId, entry, currentScene.view());
    if (embedShadowMode) {
      function onShadowVidReady() {
        if (entry.guideCanvasCtx) paintGuideCanvasOnce(entry, entry.blackKeyThr);
        scheduleShadowPaintLayoutPost();
        postShadowPaintLayoutToParent();
      }
      vid.addEventListener('loadeddata', onShadowVidReady);
      vid.addEventListener('seeked', onShadowVidReady);
      setTimeout(onShadowVidReady, 400);
      setTimeout(onShadowVidReady, 1200);
      setTimeout(function() { postShadowPaintLayoutToParent(); }, 1800);
    }
    vid.addEventListener('error', function() {
      var hevcHint = guideVideoHevcSrc(vh.src, vh);
      console.error('🎬 動画読込失敗: ' + vh.src + (hevcHint ? ' / ' + hevcHint : ''), vid.error);
      if (/iPad|iPhone|iPod/.test(navigator.userAgent || '')) {
        console.warn('🎬 iPad/iPhone では透過付き HEVC（例: video/guide_alpha_hevc.mov）を GitHub に置いてください。WebM の透過は Safari 非対応です。');
      }
    }, { once: true });
    var fadeInMs = vh.fadeInMs != null ? parseInt(vh.fadeInMs, 10) : 0;
    if (fadeInMs > 0) {
      runVideoHotspotFadeIn(wrap, fadeInMs);
    }
  });
}

function scheduleAttachVideoHotspots(sceneId, sceneData, delayMs) {
  var wait = delayMs != null ? delayMs : 0;
  setTimeout(function() {
    if (!currentSceneObj || currentSceneObj.data.id !== sceneId) return;
    if (embedPlacerMode) {
      notifyPlacerParentReady();
      if (placerPreviewHotspot) {
        tryApplyPlacerPreviewHotspot();
      } else if (sceneData.videoHotspots && sceneData.videoHotspots[0]) {
        applyPlacerPreviewHotspot(sceneData.videoHotspots[0], sceneId);
      }
      return;
    }
    if (embedShadowMode) {
      notifyShadowParentReady();
      attachShadowPaintLayoutSync();
      bindShadowEmbedOverlayTracking();
      if (!window.sceneVideoEls || !window.sceneVideoEls.length) {
        attachVideoHotspots(sceneId, sceneData);
      }
      if (shadowPreviewHotspot) {
        applyShadowPreviewHotspot(shadowPreviewHotspot, sceneId);
      } else if (sceneData.videoHotspots && sceneData.videoHotspots[0]) {
        applyShadowPreviewHotspot(sceneData.videoHotspots[0], sceneId);
      }
      notifyShadowParentReady();
      return;
    }
    attachVideoHotspots(sceneId, sceneData);
  }, wait);
}

// 出発地シーンIDに属する imageHotspots を全シーンから収集（誤って別シーン配下にあっても表示）
function collectImageHotspotsForScene(sceneId) {
  var list = [];
  data.scenes.forEach(function(sd) {
    if (!sd.imageHotspots) return;
    sd.imageHotspots.forEach(function(ih) {
      var logical = ih.sourceScene || ih.sceneStartId || sd.id;
      if (logical === sceneId) list.push(ih);
    });
  });
  return list;
}

function switchScene(sceneId, yaw, pitch, fov, fromPortalHotspot, keepFullscreenOverlay) {
  if (window.sceneGyro) window.sceneGyro.stop();
  if (embedShadowMode) stopShadowEmbedOverlayTracking();
  if (sceneId) sceneId = resolveSceneId(sceneId) || sceneId;
  var obj = scenesData[sceneId];
  if (!obj) obj = ensureFlatImageSceneRegistered(sceneId);
  if (!obj) {
    console.error('❌ シーンが data.js にありません:', sceneId);
    if (urlParams.get('back') && typeof window.goToMap === 'function') {
      window.goToMap();
      return;
    }
    if (sceneId && scenesData['0-aa001'] && sceneId !== '0-aa001') {
      console.warn('⚠️ 代わりに 0-aa001 を開きます。data.js と tiles1024/' + sceneId + '/ を確認してください。');
      switchScene('0-aa001', yaw, pitch, fov, fromPortalHotspot, keepFullscreenOverlay);
    }
    return;
  }

  console.log('🔵 switchScene: sceneId=' + sceneId + ', yaw=' + (yaw !== undefined ? radToDeg(yaw).toFixed(2) + '°' : 'undefined') + ', pitch=' + (pitch !== undefined ? radToDeg(pitch).toFixed(2) + '°' : 'undefined'));

  var prevId = currentSceneObj ? currentSceneObj.data.id : null;
  if (sceneId !== prevId) clearSceneNarrationSession(sceneId);
  var hadIosGuide = (window.sceneVideoEls || []).some(function(e) {
    return e && e.iosScreenOverlay;
  });
  if (guideDeviceIsIosSafari() && (hadIosGuide || (prevId && sceneHasVideoHotspots(prevId, currentSceneObj.data)))) {
    destroyGuideIosOverlayRoot();
  }
  var oldVideoHandles = [];
  if (prevId && sceneHasVideoHotspots(prevId, currentSceneObj.data)) {
    oldVideoHandles = (window.sceneVideoHotspotHandles || []).slice();
  }
  window.sceneVideoHotspotHandles = [];
  window.sceneVideoEls = [];
  pauseAllSceneVideos(!!keepFullscreenOverlay);
  closeHiResPeekOverlay();
  destroyHiResPeekHotspot();

  if (window.hotspotImages) {
    window.hotspotImages = [];
  }
  for (var key in window) {
    if (key.startsWith('hotspotShown_')) {
      window[key] = false;
    }
  }

  hideSceneFlatImage(true);

  if (sceneUsesFlatImage(obj.data)) {
    currentSceneObj = obj;
    if (prevId && scenesData[prevId] && !sceneUsesFlatImage(scenesData[prevId].data)) {
      window.flatImageReturnScene = prevId;
      if (currentView && currentView.parameters) {
        var pv = currentView.parameters();
        window.flatImageReturnYaw = pv.yaw;
        window.flatImageReturnPitch = pv.pitch;
        window.flatImageReturnFov = pv.fov;
      }
    }
    if (!showSceneFlatImage(obj.data, sceneId, { fromPortal: fromPortalHotspot })) {
      handleFlatImageLoadFailure(sceneId);
      return;
    }
    var textElFlat = document.getElementById('sceneText');
    if (obj.data.infoHotspots && obj.data.infoHotspots.length > 0 && (obj.data.infoHotspots[0].text || obj.data.infoHotspots[0].title)) {
      var hsFlat = obj.data.infoHotspots[0];
      var hsStyleFlat = hsFlat.style || {};
      textElFlat.textContent = normalizeInfoHotspotText(hsFlat.text || hsFlat.title);
      textElFlat.style.fontSize = scaledSceneTextFontSize(hsStyleFlat.fontSize || '20px');
      textElFlat.style.fontFamily = hsStyleFlat.fontFamily || 'sans-serif';
      textElFlat.style.color = hsStyleFlat.color || '#ffffff';
      textElFlat.style.bottom = '8%';
      textElFlat.style.left = '50%';
      textElFlat.style.transition = 'none';
      textElFlat.style.opacity = '0';
      textElFlat.style.display = 'block';
      textElFlat.getBoundingClientRect();
      textElFlat.style.transition = 'opacity 1s ease';
      textElFlat.style.opacity = '1';
    } else if (textElFlat) {
      textElFlat.style.display = 'none';
    }
    refreshCounterDisplay();
    playSceneBGM(sceneId);
    showUI();
    scheduleYellowAutoMoveAfterSwitch(sceneId, fromPortalHotspot ? 1800 : 700);
    updateCompassDisplay();
    return;
  }

  var targetYaw = yaw;
  var targetPitch = pitch;

  if (initialYaw !== null) {
    targetYaw = degToRad(parseFloat(initialYaw));
    initialYaw = null;
  } else if (targetYaw === undefined) {
    targetYaw = obj.data.initialViewParameters?.yaw;
  }

  if (initialPitch !== null) {
    targetPitch = degToRad(parseFloat(initialPitch));
    initialPitch = null;
  } else if (targetPitch === undefined) {
    targetPitch = obj.data.initialViewParameters?.pitch;
  }

  var prevView = currentView;
  var targetFov;
  if (fov !== undefined) {
    targetFov = fov;
  } else if (prevView) {
    targetFov = prevView.parameters().fov;
  } else {
    targetFov = resolveSceneInitialFov(obj.data);
  }
  var viewParams = null;
  if (targetYaw !== undefined && targetPitch !== undefined) {
    viewParams = { yaw: targetYaw, pitch: targetPitch, fov: targetFov };
  }

  var fadePct = ((typeof autoMoveActive !== 'undefined' && autoMoveActive) ||
    (typeof yellowAutoMoveEnterViaArrow !== 'undefined' && yellowAutoMoveEnterViaArrow))
    ? readAutoFadePctFromSlider()
    : null;
  var crossfadeDur = fadePct != null
    ? Math.min(2000, Math.max(0, Math.round(autoMoveInterval_ms * fadePct)))
    : 700;
  if (fromPortalHotspot) {
    crossfadeDur = Math.max(crossfadeDur, 1800);
  }

  // 切替先シーンの view に先に向きを入れてから switchTo（0°に戻るのを防ぐ）
  if (viewParams) {
    applyViewParamsToScene(obj, viewParams, '事前');
  }

  currentSceneObj = obj;
  if (!obj.scene || !obj.view) {
    console.error('❌ VRシーンを表示できません:', sceneId);
    return;
  }
  currentScene = obj.scene;
  currentView = obj.view;
  bindSpatialBgmViewListener(currentView);
  if (guideDeviceIsIosSafari()) rebindGuideIosViewListener();

  if (sceneHasVideoHotspots(sceneId, obj.data)) {
    if (embedPlacerMode || embedShadowMode) {
      scheduleAttachVideoHotspots(sceneId, obj.data, 0);
    } else {
      attachVideoHotspots(sceneId, obj.data);
    }
  }

  currentScene.switchTo({ transitionDuration: crossfadeDur });

  if (viewParams && !embedPlacerMode) {
    function reapply(tag) {
      if (!currentSceneObj || currentSceneObj.data.id !== sceneId) return;
      applyViewParamsToScene(currentSceneObj, viewParams, tag);
    }
    reapply('直後');
    requestAnimationFrame(function() { reapply('rAF'); });
    setTimeout(function() { reapply('50ms'); }, 50);
    setTimeout(function() { reapply('fade後'); }, Math.max(80, crossfadeDur + 80));
    setTimeout(function() { reapply('再確認'); }, crossfadeDur + 280);
    if (fromPortalHotspot) {
      lockPortalArrivalView(obj, viewParams, Math.max(3500, crossfadeDur + 1500));
    }
  }

  if (oldVideoHandles.length) {
    setTimeout(function() {
      destroySceneVideoHotspots(oldVideoHandles);
    }, Math.max(400, crossfadeDur + 400));
  }
  
  // ===== infoHotspot テキスト表示（1シーン1回限り・7秒後フェードアウト） =====
  var textEl = document.getElementById('sceneText');
  // 【診断ログ】data.jsのinfoHotspotsを毎回確認
  var _ihs = obj.data.infoHotspots;
  console.log('📝 [infoHotspot診断] sceneId=' + sceneId
    + ' | 件数=' + (_ihs ? _ihs.length : 0)
    + ' | text=' + (_ihs && _ihs[0] ? (_ihs[0].text || _ihs[0].title) : 'なし'));
  if (obj.data.infoHotspots && obj.data.infoHotspots.length > 0 && (obj.data.infoHotspots[0].text || obj.data.infoHotspots[0].title)) {
    var hs = obj.data.infoHotspots[0];
    var hsStyle = hs.style || {};
    textEl.textContent = normalizeInfoHotspotText(hs.text || hs.title);
    textEl.style.fontSize = scaledSceneTextFontSize(hsStyle.fontSize || '20px');
    textEl.style.fontFamily = hsStyle.fontFamily || 'sans-serif';
    textEl.style.color = hsStyle.color || '#ffffff';
    // pitch → 画面の縦位置（bottom %）
    var hsPitch = typeof hs.pitch === 'number' ? hs.pitch : 0.9;
    var bottomPct = Math.round(((1.5 - hsPitch) / 3.0) * 100);
    bottomPct = Math.max(2, Math.min(92, bottomPct));
    textEl.style.bottom = bottomPct + '%';
    // yaw → 画面の横位置（left %）
    var hsYaw = typeof hs.yaw === 'number' ? hs.yaw : 0;
    var leftPct = Math.round(((hsYaw + Math.PI) / (2 * Math.PI)) * 100);
    leftPct = Math.max(10, Math.min(90, leftPct));
    textEl.style.left = leftPct + '%';
    textEl.style.transition = 'none';
    textEl.style.opacity = '0';
    textEl.style.display = 'block';
    textEl.getBoundingClientRect(); // 強制リフロー：opacity:0 を確定させる
    textEl.style.transition = 'opacity 1s ease';
    textEl.style.opacity = '1';
    // 既存タイマーをリセット
    if (window.sceneTextTimer) { clearTimeout(window.sceneTextTimer); }
    if (window.sceneTextHideTimer) { clearTimeout(window.sceneTextHideTimer); }
    // 5秒後にフェードアウト開始（以前より2秒短縮）
    window.sceneTextTimer = setTimeout(function() {
      textEl.style.transition = 'opacity 6.75s ease';
      textEl.style.opacity = '0';
      window.sceneTextHideTimer = setTimeout(function() {
        textEl.style.display = 'none';
        window.sceneTextHideTimer = null;
      }, 6750);
      window.sceneTextTimer = null;
    }, 5000);
  } else {
    if (window.sceneTextTimer) { clearTimeout(window.sceneTextTimer); }
    if (window.sceneTextHideTimer) { clearTimeout(window.sceneTextHideTimer); }
    textEl.style.display = 'none';
  }
  
  refreshCounterDisplay();
  console.log('🔢 カウンター: ' + formatCounterLabel(obj.data) + ' (scene=' + sceneId + ')');
  // ★ BGM処理：シーン切り替え時に再生（地図ON/OFF＋長押し状態に従う）
  playSceneBGM(sceneId);
  
  showUI();
  
  scheduleYellowAutoMoveAfterSwitch(sceneId, crossfadeDur);
  
  // ★imageHotspots（出発地＝sceneId に紐づくものを全シーンから収集）
  var portalList = collectImageHotspotsForScene(sceneId);
  console.log('🔍 [switchScene] sceneId=' + sceneId + ' ポータル件数=' + portalList.length);
  if (portalList.length > 0) {
    portalList.forEach(function(ih, portalIdx) {
      if (!portalHasRenderableMedia(ih)) {
        console.warn('⚠️ ポータル省略（画像・動画なし）: 移動先=' + (ih.targetScene || '?'));
        return;
      }
      var wrapper = document.createElement('div');
      var inner = document.createElement('div');
      var img = document.createElement('img');
      var hitArea = document.createElement('div');
      var cover = null;
      var fadeMs = portalFadeMs(ih);
      var preset = portalEffectPreset(ih);
      if (ih.src && String(ih.src).trim()) {
        img.src = ih.src;
        img.onerror = function() {
          this.style.display = 'none';
          this.style.border = 'none';
        };
      } else {
        img.style.display = 'none';
      }
      img.alt = '';
      img.style.opacity = preset.reveal ? '0' : '1';
      img.style.transition = 'opacity ' + fadeMs + 'ms ease-in-out';
      wrapper.className = 'image-hotspot portal-hotspot';
      wrapper.style.cssText = [
        'width:' + (ih.width || 400) + 'px',
        'height:' + (ih.height || 300) + 'px',
        'opacity:0',
        'transition:opacity ' + fadeMs + 'ms ease-in-out',
        'cursor:pointer',
        'pointer-events:none'
      ].join(';');
      inner.className = 'portal-inner';
      inner.appendChild(img);
      if (isRevealPortal(ih)) {
        cover = document.createElement('div');
        cover.className = 'portal-reveal-cover';
        inner.appendChild(cover);
      }
      hitArea.className = 'portal-hit-area';
      hitArea.style.zIndex = String(1000 - portalIdx);
      preparePortalMotion(inner, cover, ih, fadeMs);
      wrapper.appendChild(inner);
      wrapper.appendChild(hitArea);
      
      var hsRef = {
        img: wrapper,
        portalImg: img,
        inner: inner,
        cover: cover,
        hitArea: hitArea,
        ih: ih,
        sceneId: sceneId,
        flagKey: 'hotspotShown_' + sceneId + '_' + portalIdx + '_' + (ih.targetScene || 'portal'),
        portalActive: false,
        portalFadingOut: false,
        portalFadeOutTimer: null,
        videoPlaying: false,
        linkedVideo: null,
        autoFadeTimer: null
      };
      bindPortalTap(hitArea, function() { onPortalHotspotTap(hsRef); });
      
      var placeYaw = portalPlacementYawRad(ih);
      var placePitch = portalPlacementPitchRad(ih);

      console.log('🎎 ポータル配置: ' + sceneId + ' → ' + (ih.targetScene || '?') +
        ' yaw=' + portalCenterDeg(ih) + '° pitch=' + portalCenterPitchDeg(ih) + '°' +
        ' | 着地点pitch=' + (function() {
          var tv = resolvePortalTargetView(ih);
          return tv.pitch != null ? radToDeg(tv.pitch).toFixed(1) : '?';
        })() + '°');

      // ★hotspot を VR 空間に配置（yawCenter / pitchCenter）
      currentScene.hotspotContainer().createHotspot(wrapper,
        { yaw: placeYaw, pitch: placePitch },
        { perspective: { radius: ih.radius || 800 } }
      );
      
      // ★updateUI で opacity 制御用のグローバル参照を保持
      if (!window.hotspotImages) window.hotspotImages = [];
      window.hotspotImages.push(hsRef);
    });
  }

  attachHiResPeekHotspot(sceneId, obj.data);

  updateCompassDisplay();
}

var VR_HEADING_ADJ_KEY = 'marzipano_vr_heading_adj';
var headingAdjPerScene = true;
var HEADING_ADJ_STEP = 5;

function getVRHeadingStorageKey() {
  var name = 'default';
  if (typeof APP_DATA !== 'undefined' && APP_DATA && APP_DATA.name) {
    name = String(APP_DATA.name).replace(/\s+/g, '_');
  }
  return 'marzipano_vr_heading_' + name;
}

function migrateVRHeadingAdjKey() {
  try {
    var key = getVRHeadingStorageKey();
    if (localStorage.getItem(key)) return;
    var old = localStorage.getItem(VR_HEADING_ADJ_KEY);
    if (old) localStorage.setItem(key, old);
  } catch (eMig) {}
}
migrateVRHeadingAdjKey();

function loadVRHeadingAdj() {
  try {
    var key = getVRHeadingStorageKey();
    var raw = localStorage.getItem(key);
    if (!raw) raw = sessionStorage.getItem(key);
    if (!raw) return { globalFine: 0, sceneFine: {} };
    var o = JSON.parse(raw);
    return {
      globalFine: Number(o.globalFine) || 0,
      sceneFine: (o && o.sceneFine && typeof o.sceneFine === 'object') ? o.sceneFine : {}
    };
  } catch (eLoad) {
    return { globalFine: 0, sceneFine: {} };
  }
}

function saveVRHeadingAdj(adj) {
  try {
    localStorage.setItem(getVRHeadingStorageKey(), JSON.stringify(adj));
    sessionStorage.setItem(getVRHeadingStorageKey(), JSON.stringify(adj));
  } catch (eSave) {}
}

function getVRHeadingExtra(sceneId) {
  var adj = loadVRHeadingAdj();
  var extra = adj.globalFine || 0;
  if (sceneId && adj.sceneFine[sceneId] != null) {
    extra += Number(adj.sceneFine[sceneId]) || 0;
  }
  return extra;
}

function nudgeVRHeading(delta) {
  var adj = loadVRHeadingAdj();
  if (headingAdjPerScene && currentSceneObj && currentSceneObj.data && currentSceneObj.data.id) {
    var sid = currentSceneObj.data.id;
    adj.sceneFine[sid] = (Number(adj.sceneFine[sid]) || 0) + delta;
  } else {
    adj.globalFine = (Number(adj.globalFine) || 0) + delta;
  }
  saveVRHeadingAdj(adj);
  updateCompassDisplay();
}

function updateHeadingAdjModeLabel() {
  var el = document.getElementById('headingAdjMode');
  if (!el) return;
  if (headingAdjPerScene) {
    el.textContent = 'このシーン';
    el.classList.add('is-scene');
  } else {
    el.textContent = '全体';
    el.classList.remove('is-scene');
  }
}

function initHeadingAdjustControls() {
  var leftBtn = document.getElementById('headingAdjLeft');
  var rightBtn = document.getElementById('headingAdjRight');
  var modeEl = document.getElementById('headingAdjMode');
  if (leftBtn) {
    leftBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      nudgeVRHeading(-HEADING_ADJ_STEP);
      if (typeof showUI === 'function') showUI();
    });
  }
  if (rightBtn) {
    rightBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      nudgeVRHeading(HEADING_ADJ_STEP);
      if (typeof showUI === 'function') showUI();
    });
  }
  if (modeEl) {
    modeEl.addEventListener('click', function(e) {
      e.stopPropagation();
      headingAdjPerScene = !headingAdjPerScene;
      updateHeadingAdjModeLabel();
      if (typeof showUI === 'function') showUI();
    });
  }
  updateHeadingAdjModeLabel();
}

function hasSceneCompassData(sceneData) {
  if (!sceneData) return false;
  if (sceneData.compassHeading !== undefined && sceneData.compassHeading !== null &&
      !isNaN(Number(sceneData.compassHeading))) {
    return true;
  }
  if (sceneData.heading !== undefined && sceneData.heading !== null &&
      !isNaN(Number(sceneData.heading))) {
    return true;
  }
  return false;
}

function getSceneNorthOffset(sceneData) {
  if (!hasSceneCompassData(sceneData)) return null;
  if (sceneData.compassHeading !== undefined && sceneData.compassHeading !== null &&
      !isNaN(Number(sceneData.compassHeading))) {
    return Number(sceneData.compassHeading);
  }
  return Number(sceneData.heading);
}

function updateLocationWidgets() {
  var sceneData = currentSceneObj && currentSceneObj.data;
  var hasCompass = hasSceneCompassData(sceneData);
  var northOff = getSceneNorthOffset(sceneData);
  var yawDeg = currentView ?
    radToDeg(normalizeAngle(currentView.parameters().yaw)) : 0;
  var hasPos = sceneData && sceneData.lat != null && sceneData.lng != null &&
    !isNaN(Number(sceneData.lat)) && !isNaN(Number(sceneData.lng));

  if (miniMapWidget) {
    miniMapWidget.update({
      lat: hasPos ? Number(sceneData.lat) : null,
      lng: hasPos ? Number(sceneData.lng) : null,
      yawDeg: yawDeg,
      northOff: northOff,
      vrHeadingFine: sceneData ? getVRHeadingExtra(sceneData.id) : 0,
      showBearing: hasCompass,
      sceneId: sceneData ? sceneData.id : ''
    });
  }
}

function updateCompassDisplay() {
  updateLocationWidgets();
}

function updateUI() {
  if (!currentView) return;
  refreshCounterDisplay();
  var yawDeg = radToDeg(normalizeAngle(currentView.parameters().yaw));
  var pitch = radToDeg(currentView.parameters().pitch);

  var yawEl = document.getElementById('yawTxt');
  var pitchEl = document.getElementById('pitchTxt');
  if (yawEl) yawEl.textContent = String(Math.round(yawDeg));
  if (pitchEl) pitchEl.textContent = String(Math.round(pitch));

  updateCompassDisplay();

  // ★ホットスポットエディタ連携：現在の向きをlocalStorageに書き込む
  try {
    localStorage.setItem('hs_sceneId', currentSceneObj ? currentSceneObj.data.id : '');
    localStorage.setItem('hs_yaw',   currentView.parameters().yaw);
    localStorage.setItem('hs_pitch', currentView.parameters().pitch);
  } catch(e) {}

  updateHiResPeekFrameVisibility();

  var yawAbs = Math.abs(yawDeg);
  var isVert = yawAbs <= 45 || yawAbs > 135;
  var sceneId = currentSceneObj ? currentSceneObj.data.id : null;
  var junctionCfg = sceneId ? getSideBranchSceneConfig(sceneId) : null;
  var junctionVis = getJunctionYellowLayout(junctionCfg);
  var showUp = junctionVis ? junctionVis.up : isVert;
  var showDown = junctionVis ? junctionVis.down : isVert;
  var showLeft = junctionVis ? junctionVis.left : !isVert;
  var showRight = junctionVis ? junctionVis.right : !isVert;
  document.getElementById('arrowUp').style.visibility = showUp ? 'visible' : 'hidden';
  document.getElementById('arrowDown').style.visibility = showDown ? 'visible' : 'hidden';
  document.getElementById('arrowLeft').style.visibility = showLeft ? 'visible' : 'hidden';
  document.getElementById('arrowRight').style.visibility = showRight ? 'visible' : 'hidden';
  syncYellowArrowVisibility();

  if (window.hotspotImages && window.hotspotImages.length > 0) {
    window.hotspotImages.forEach(function(hs) {
      if (currentSceneObj && currentSceneObj.data.id === hs.sceneId && !window[hs.flagKey]) {
        var center = portalCenterDeg(hs.ih);
        var range = portalRangeDeg(hs.ih);
        var pitchCenter = portalCenterPitchDeg(hs.ih);
        var pitchRange = portalPitchRangeDeg(hs.ih);
        var inRange = Math.abs(angleDiffDeg(yawDeg, center)) <= range * PORTAL_VIEW_RANGE_BOOST &&
          Math.abs(pitch - pitchCenter) <= pitchRange * PORTAL_VIEW_RANGE_BOOST;
        
        if (inRange) {
          var fadeMs = portalFadeMs(hs.ih);
          var dispMs = portalDispMs(hs.ih);
          var totalTime = fadeMs + dispMs;
          var preset = portalEffectPreset(hs.ih);
          var appearMs = fadeMs;
          var imageDelayMs = preset.reveal ? Math.min(120, Math.round(portalStartHoldMs(hs.ih, preset) * 0.5), Math.max(0, totalTime - appearMs)) : 0;
          window[hs.flagKey] = true;
          hs.portalFadingOut = false;
          if (hs.portalFadeOutTimer) {
            clearTimeout(hs.portalFadeOutTimer);
            hs.portalFadeOutTimer = null;
          }
          showPortalMotion(hs.inner, hs.cover, hs.ih, totalTime);
          hs.img.style.transition = 'opacity ' + appearMs + 'ms ease-in-out';
          hs.img.style.opacity = '1';
          setPortalTappable(hs, true);
          if (hs.portalImg) {
            hs.portalImg.style.opacity = preset.reveal ? '0' : '1';
            hs.portalImg.style.transition = 'opacity ' + appearMs + 'ms ease-in-out';
            setTimeout(function() {
              if (hs.portalImg) hs.portalImg.style.opacity = '1';
            }, imageDelayMs);
          }
          console.log('🎎 hotspot フェードイン開始: ' + hs.ih.src + ' (fadeTime=' + hs.ih.fadeTime + 's, dispTime=' + dispMs + 'ms → totalTime=' + totalTime + 'ms ≈ ' + (totalTime/1000).toFixed(1) + '秒)');
          
          if (hs.ih.videoSrc && hs.ih.playVideoOnTap !== false) {
            console.log('🎬 動画ポータル: タップで ' + hs.ih.videoSrc + ' を再生');
          }
          // 消え始めてもフェード完了まではタップ可能
          hs.autoFadeTimer = setTimeout(function() {
            if (hs.videoPlaying) return;
            var fadeOutMs = Math.max(appearMs, fadeMs, 450);
            hidePortalMotion(hs.inner, hs.cover, hs.ih);
            if (hs.portalImg) {
              hs.portalImg.style.transition = 'opacity ' + fadeOutMs + 'ms ease-in-out';
              hs.portalImg.style.opacity = '0';
            }
            hs.img.style.transition = 'opacity ' + fadeOutMs + 'ms ease-in-out';
            hs.img.style.opacity = '0';
            hs.portalFadingOut = true;
            setPortalTappable(hs, true);
            if (hs.portalFadeOutTimer) clearTimeout(hs.portalFadeOutTimer);
            hs.portalFadeOutTimer = setTimeout(function() {
              hs.portalFadeOutTimer = null;
              hs.portalFadingOut = false;
              setPortalTappable(hs, false);
              console.log('🎎 hotspot フェードアウト完了: ' + hs.ih.src);
              if (hs.ih.resetDisplay) {
                window[hs.flagKey] = false;
                console.log('🔄 hotspot リセット表示有効: 次に表示範囲に入ったら再表示します');
              }
            }, fadeOutMs);

          }, totalTime);
        }
      }
    });
  }

  updateSideBranchBlink();
}
