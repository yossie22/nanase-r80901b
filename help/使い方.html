<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>VRツアーの使い方</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Meiryo", sans-serif;
  color: #f8f8f8;
  background: #171717;
  line-height: 1.7;
  font-size: 18px;
}
.wrap {
  max-width: 860px;
  margin: 0 auto;
  padding: 20px 14px 40px;
}
.top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
h1 {
  font-size: 28px;
  margin: 0;
  color: #66e8ff;
}
.back {
  margin-left: auto;
  color: #111;
  background: #ffe26a;
  text-decoration: none;
  font-weight: bold;
  padding: 8px 14px;
  border-radius: 999px;
}
.back.bottom {
  display: inline-block;
  margin: 18px 0 0;
}
.card {
  background: #242424;
  border: 1px solid #444;
  border-radius: 14px;
  padding: 16px;
  margin: 12px 0;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
}
.step {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 14px;
  align-items: center;
}
.step-mark {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 56px;
  background: transparent;
  border: none;
  padding: 0;
}
.step-mark img {
  display: block;
  width: auto;
  height: auto;
  max-width: 70px;
  max-height: 70px;
  background: transparent;
  border: none;
  box-shadow: none;
}
.step-mark--pin {
  flex-direction: column;
  align-items: center;
}
.help-map-pin {
  width: 36px;
  height: 36px;
  border: 3px solid #fff;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  box-shadow: 0 3px 8px rgba(0,0,0,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
  background: #e8453c;
}
.help-map-pin-num {
  transform: rotate(45deg);
  font-size: 14px;
  font-weight: bold;
  color: #fff;
  line-height: 1;
  font-family: sans-serif;
}
.step-mark--magnifier svg {
  width: 52px;
  height: 52px;
  display: block;
}
.step-mark--magnifier.color-pink { color: #ff4da6; }
.step-mark--magnifier.color-green { color: #4de67a; }
.step-mark--magnifier.color-gold { color: #f5c518; }
.step-mark--look {
  font-size: 40px;
  line-height: 1;
}
.step-mark--gyro span {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: rgba(48, 108, 210, 0.92);
  color: #fff;
  font-size: 10px;
  font-weight: bold;
  font-family: sans-serif;
  letter-spacing: -0.3px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.45);
}
.step-mark--counter span {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: #fff;
  border: 3px solid #ff0000;
  color: #0066ff;
  font-size: 22px;
  font-weight: bold;
  font-family: sans-serif;
  box-shadow: 0 2px 8px rgba(0,0,0,0.35);
}
.step-text strong {
  color: #ffe26a;
}
.step-text {
  color: #d8d8d8;
}
.step-mark--compass {
  position: relative;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: 3px solid #0066ff;
  background: rgba(255,255,255,0.95);
  box-shadow: 0 2px 8px rgba(0,0,0,0.35);
}
.help-compass-dial {
  position: absolute;
  top: 4px;
  left: 50%;
  transform: translateX(-50%);
  color: #E60000;
  font-size: 11px;
  font-weight: bold;
  font-family: sans-serif;
}
.help-compass-needle {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 0;
  height: 0;
  border-left: 7px solid transparent;
  border-right: 7px solid transparent;
  border-bottom: 22px solid #E60000;
  transform: translate(-50%, -72%);
}
.gps-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  font-size: 13px;
}
.gps-table th,
.gps-table td {
  border: 1px solid #555;
  padding: 6px 8px;
  text-align: left;
}
.gps-table th {
  background: #2f2f2f;
  color: #ddd;
}
.gps-table td {
  color: #ececec;
  font-family: Consolas, "Courier New", monospace;
}
.gps-appendix .tip {
  display: block;
  margin-top: 6px;
}
.blink img {
  animation: helpArrowBlink 1.7s ease-in-out infinite;
}
@keyframes helpArrowBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.35; }
}
.tip {
  color: #d8d8d8;
  font-size: 16px;
}
.small {
  color: #aaa;
  font-size: 15px;
  margin-top: 18px;
  white-space: pre-line;
}
strong { color: #fff; }
.card strong { color: #ffe26a; }
</style>
<script src="../data.js"></script>
<script src="help.js"></script>
</head>
<body>
<div class="wrap" id="helpRoot">
  <div class="top">
    <h1 data-help-title>VRツアーの使い方</h1>
    <a class="back" data-help-back href="../map.html">地図に戻る</a>
  </div>
  <div data-help-steps></div>
  <div data-help-notes></div>
  <div data-help-gps></div>
  <div class="small" data-help-footer></div>
  <a class="back bottom" data-help-back-bottom href="../map.html">地図に戻る</a>
</div>
<script>
(function() {
  function showHelp() {
    HelpEngine.initHelpPage('#helpRoot');
  }
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'config.js?' + Date.now(), true);
  xhr.onload = function() {
    if (xhr.status === 200 || xhr.status === 0) {
      try { eval(xhr.responseText); } catch (e) {}
    }
    showHelp();
  };
  xhr.onerror = showHelp;
  xhr.send();
})();
</script>
</body>
</html>
